# Ant worker — connects to queen via WebSocket. Run after starting queen with formicary-queen.yaml.
# Run: make ant
common:
    http_port: 0
    queue:
        provider: "WEBSOCKET_MESSAGING"
        websocket:
            server_endpoint: "ws://localhost:7777/ws/queue"
            buffer_db_path: "/tmp/formicary-ant-buffer.db"
            reconnect_min_delay: 1s
            reconnect_max_delay: 30s
    s3:
        endpoint: "localhost:8333"
        access_key_id: "localkey"
        secret_access_key: "localsecret"
        bucket: formicary-artifacts
tags: ["docker", "shell", "builder"]
methods:
    - DOCKER
    - SHELL
    - HTTP_GET
    - HTTP_POST_FORM
    - HTTP_POST_JSON
    - HTTP_PUT_FORM
    - HTTP_PUT_JSON
    - HTTP_DELETE
docker:
  host: "unix:///var/run/docker.sock"
kubernetes:
    namespace: "default"
    allow_privilege_escalation: true
    default_resources:
      cpuRequest: "500m"
      memoryRequest: "512Mi"
      cpuLimit: "1"
      memoryLimit: "1Gi"
