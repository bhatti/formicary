# Local dev — self-contained, no external services needed.
#
# Paths default to /data (Docker volume mount: -v ~/formicary-data:/data).
# For local development, make run overrides these via env vars:
#   DB_DATA_SOURCE=./formicary_db.sqlite
#   COMMON_S3_LOCAL_DATA_DIR=./data/seaweedfs
#   COMMON_S3_LOCAL_WEED_BIN=./bin/weed
#
# Run (Docker):  make docker-run-embedded
# Run (local):   make run
common:
    public_dir: /app/public/
    http_port: 7777
    rate_limit_sec: 100
    s3:
        local_mode: true
        local_data_dir: /data/seaweedfs
        local_weed_bin: /usr/local/bin/weed
        local_s3_port: 19000
        bucket: formicary-artifacts
        public_endpoint: localhost:19000
    auth:
        enabled: true
        # COMMON_AUTH_JWT_SECRET, COMMON_AUTH_GOOGLE_CLIENT_ID, COMMON_AUTH_GOOGLE_CLIENT_SECRET
db:
    data_source: /data/formicary.db
    type: sqlite
embedded_ant:
    tags: ["docker", "kubernetes", "shell", "builder"]
    methods:
      - DOCKER
      - KUBERNETES
      - SHELL
      - HTTP_GET
      - HTTP_POST_FORM
      - HTTP_POST_JSON
      - HTTP_PUT_FORM
      - HTTP_PUT_JSON
      - HTTP_DELETE
    max_capacity: 10
    docker:
      host: "unix:///var/run/docker.sock"
    kubernetes:
      namespace: "default"
      allow_privilege_escalation: true
      default_resources:
        cpuRequest: "500m"
        memoryRequest: "512Mi"
        cpuLimit: "1"
        memoryLimit: "1Gi"
