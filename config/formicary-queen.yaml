# Queen-only mode — ants connect via WebSocket, embedded SeaweedFS for artifacts.
# Run: make run-queen   (start ants separately with formicary-ant.yaml)
common:
    public_dir: ./public/
    http_port: 7777
    queue:
        provider: "WEBSOCKET_MESSAGING"
        websocket:
            path: "/ws/queue"
    s3:
        local_mode: true
        local_data_dir: ./data/seaweedfs
        local_weed_bin: ./bin/weed
        local_s3_port: 19000
        bucket: formicary-artifacts
    auth:
        enabled: true
        # COMMON_AUTH_JWT_SECRET, COMMON_AUTH_GOOGLE_CLIENT_ID, COMMON_AUTH_GOOGLE_CLIENT_SECRET
db:
    data_source: formicary_db.sqlite
    type: sqlite
