# Single-container deployment: queen + embedded ant + embedded SeaweedFS + SQLite.
# No Redis, MinIO, or separate ant container needed.
#
# Quickstart (no git clone required):
#   curl -fsSL https://raw.githubusercontent.com/bhatti/formicary/main/docker-compose.yaml -o docker-compose.yaml
#   mkdir -p config
#   curl -fsSL https://raw.githubusercontent.com/bhatti/formicary/main/config/formicary-docker.yaml -o config/formicary-docker.yaml
#   export COMMON_AUTH_JWT_SECRET=$(openssl rand -base64 32)
#   docker compose up
#
# Disable auth for local testing (no OAuth creds needed):
#   COMMON_AUTH_ENABLED=false docker compose up

services:
  formicary:
    image: plexobject/formicary:latest
    container_name: formicary
    environment:
      # Auth — set these in your shell or a .env file (never commit secrets)
      # Set COMMON_AUTH_ENABLED=false to disable auth for local testing
      COMMON_AUTH_ENABLED: '${COMMON_AUTH_ENABLED:-true}'
      COMMON_AUTH_JWT_SECRET: '${COMMON_AUTH_JWT_SECRET:-}'
      COMMON_AUTH_GOOGLE_CLIENT_ID: '${COMMON_AUTH_GOOGLE_CLIENT_ID:-}'
      COMMON_AUTH_GOOGLE_CLIENT_SECRET: '${COMMON_AUTH_GOOGLE_CLIENT_SECRET:-}'
      COMMON_AUTH_GOOGLE_CALLBACK_HOST: '${COMMON_AUTH_GOOGLE_CALLBACK_HOST:-localhost}'
      COMMON_AUTH_GITHUB_CLIENT_ID: '${COMMON_AUTH_GITHUB_CLIENT_ID:-}'
      COMMON_AUTH_GITHUB_CLIENT_SECRET: '${COMMON_AUTH_GITHUB_CLIENT_SECRET:-}'
    ports:
      - "7777:7777"
      - "19000:19000"  # SeaweedFS S3 — required for artifact download links in the UI
    volumes:
      # Config is baked into the image — no config mount needed.
      # Persistent state: SQLite DB + SeaweedFS blobs
      - formicary-data:/data
      # Docker socket — remove if you don't need the Docker executor
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  formicary-data:
    driver: local
