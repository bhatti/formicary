# Periodic maintenance: cleans stale workspaces and removes merged/closed AI branches.
# Runs every 4 hours via cron.
#
# cleanup task runs inside the ai-dev-tools image:
#   - Removes workspace subdirectories older than 4 hours
#   - Deletes remote ai/* branches whose PRs are merged or closed
#
# Deploy:
#   ./deploy-ai-workflows.sh --set-configs --gh-org YOUR_ORG --gh-repo YOUR_REPO \
#     --gh-token $GITHUB_TOKEN --anthropic-key $ANTHROPIC_API_KEY

job_type: ai-gh-cleanup
description: "Periodic maintenance: clean stale workspaces and merged AI branches"
cron_trigger: "0 0 */4 * * * *"
max_concurrency: 1
timeout: 10m

tasks:
- task_type: cleanup
  method: KUBERNETES
  timeout: 8m
  report_stdout: true
  host_network: true
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      host_path:
        - name: workspace
          mount_path: /workspace
          host_path: /var/formicary/ai-workspace
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
  script:
    - python -m scripts.gh.cleanup
  artifacts:
    paths:
      - /workspace/cleanup_report.txt
    when: always

job_variables:
  ClaudeUseBedrock: "1"
  AnthropicBedrockBaseUrl: "http://ai/bedrock"
  ClaudeSkipBedrockAuth: "1"
  # Injected via org configs (set via deploy-ai-workflows.sh --set-configs):
  #   GitHubOrg, GitHubRepo         (plain)
  #   GithubToken, AnthropicApiKey  (secret)
