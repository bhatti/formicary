# SHELL variant — runs on a bare ant worker with SSH keys and gh auth configured.
# Prerequisites: claude CLI, gh CLI, git, python3, jq, SSH key for GitHub.
#
# Workspace: ~/claude_workspace/<Repo>-issue<IssueNumber>-<Nonce> (persisted for inspection)
# Output: tee'd to stdout for streaming logs + saved as artifacts.
# report_stdout: true on all tasks so Formicary streams output in real-time.
#
# K8s deployment: mount SSH key secret as volume:
#   container:
#     volumes:
#       host_path:
#         - name: ssh-key
#           mount_path: /run/secrets/ssh
#           host_path: /var/secrets/agent-ssh   # backed by K8s secret ref
#
# For persistent workspaces across pod restarts, mount a PVC:
#   container:
#     volumes:
#       host_path:
#         - name: workspace
#           mount_path: /home/ant/claude_workspace
#           host_path: /mnt/agent-workspace      # backed by PVC in K8s
# Without a PVC the workspace is lost when the container exits (fine for one-shot jobs).
#
# K8s hard timeout: Formicary enforces job timeout at the queen level (timeout: 90m below).
# For a K8s-level backstop (pod kill), configure MaxTaskTimeout in the ant worker config.
# See: internal/ant_config/ant_config.go MaxTaskTimeout field.

job_type: ai-gh-implement
sem_version: "1.0"
description: "AI agent: plan -> implement -> validate -> self-verify -> create PR -> monitor PR"
max_concurrency: 5
timeout: 90m

tasks:
# --- SETUP -------------------------------------------------------------------
- task_type: setup
  method: SHELL
  timeout: 3m
  report_stdout: true
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      TASK_DIR="$PWD"
      WS="$HOME/claude_workspace/{{.GitHubRepo}}-issue{{.IssueNumber}}-{{.Nonce}}"
      echo "=== SETUP ==="
      echo "TASK_DIR=$TASK_DIR"
      echo "WS=$WS"
      echo "Issue: #{{.IssueNumber}} {{.IssueTitle}}"
      echo "Repo: {{.GitHubOrg}}/{{.GitHubRepo}}"
      echo "---"

      # SSH key injection for K8s (secret mounted at /run/secrets/ssh, no-op locally)
      if [ -f "/run/secrets/ssh/id_rsa" ] && [ ! -f "$HOME/.ssh/id_rsa" ]; then
        mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
        cp /run/secrets/ssh/id_rsa "$HOME/.ssh/id_rsa" && chmod 600 "$HOME/.ssh/id_rsa"
        ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
        echo "SSH key injected from /run/secrets/ssh"
      fi

      rm -rf "$WS"
      mkdir -p "$WS"

      SLUG=$(printf '%s' "{{.IssueTitle}}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-30)
      BRANCH="ai/{{.IssueNumber}}-${SLUG}-{{.Nonce}}"
      echo "Branch: $BRANCH"

      echo "Cloning git@github.com:{{.GitHubOrg}}/{{.GitHubRepo}}.git ..."
      git clone --depth=100 "git@github.com:{{.GitHubOrg}}/{{.GitHubRepo}}.git" "$WS/repo"
      cd "$WS/repo"

      git config user.name "{{.GitUserName}}"
      git config user.email "{{.GitUserEmail}}"
      git checkout -b "$BRANCH"
      echo "Branch created: $BRANCH"

      # Per-repo initialization hook (follows .goatbot/init.sh convention)
      if [ -f ".ai-agent/init.sh" ]; then
        echo "=== Running per-repo .ai-agent/init.sh ==="
        chmod +x ".ai-agent/init.sh"
        bash ".ai-agent/init.sh" 2>&1 || true
        echo "=== Per-repo init complete ==="
      fi

      # Read issue body from file (written by issue picker to avoid heredoc injection)
      ISSUE_BODY=$(cat "$TASK_DIR/{{.IssueBodyFile}}" 2>/dev/null || echo "")

      printf '# Issue #%s: %s\n\n%s\n' "{{.IssueNumber}}" "{{.IssueTitle}}" "$ISSUE_BODY" \
        > "$WS/repo/ISSUE_CONTEXT.md"

      echo "--- ISSUE_CONTEXT.md ---"
      cat "$WS/repo/ISSUE_CONTEXT.md"
      echo "---"

      printf 'WS=%s\nBRANCH=%s\n' "$WS" "$BRANCH" > "$TASK_DIR/meta.env"
      BRANCH_LINK="[${BRANCH}](https://github.com/{{.GitHubOrg}}/{{.GitHubRepo}}/tree/${BRANCH})"
      printf '%s\n' "$BRANCH_LINK" > "$TASK_DIR/branch.txt"

      # Write shared run_agent helper — invoked with `bash run_agent.sh <prompt> <turns> <out>`
      # so it always runs under bash regardless of the ant executor shell (/bin/sh -c).
      # Using printf to avoid a bare heredoc whose unindented body would break YAML parsing.
      printf '%s\n' \
        '#!/bin/bash' \
        '# Usage: bash run_agent.sh <prompt_file> <max_turns> <out_file>' \
        '# Requires MODEL env var. Outputs the last status JSON found.' \
        'set -eo pipefail' \
        'prompt_file="$1"' \
        'max_turns="$2"' \
        'out_file="$3"' \
        'set +e' \
        'claude --print --dangerously-skip-permissions \' \
        '  --model "$MODEL" --max-turns "$max_turns" \' \
        '  "$(cat "$prompt_file")" 2>&1 | tee "$out_file"' \
        'CLAUDE_EXIT=${PIPESTATUS[0]}' \
        'set -e' \
        'STATUS_JSON=$(grep -oE '"'"'\{[^{}]*"status"[^{}]*\}'"'"' "$out_file" | tail -1 || true)' \
        '[ -z "$STATUS_JSON" ] && STATUS_JSON='"'"'{"status":"DONE"}'"'"'' \
        'printf '"'"'%s\n'"'"' "$STATUS_JSON"' \
        > "$TASK_DIR/run_agent.sh"
      chmod +x "$TASK_DIR/run_agent.sh"

      echo "::set-output name=WorkspaceDir::$WS/repo"
      echo "=== SETUP COMPLETE ==="
      echo "Workspace: $WS/repo"
      echo "Branch: $BRANCH"
      ls -la "$WS/repo"
  artifacts:
    paths:
      - meta.env
      - branch.txt
      - run_agent.sh
    when: always
  on_completed: plan

# --- PLAN --------------------------------------------------------------------
- task_type: plan
  method: SHELL
  timeout: 15m
  report_stdout: true
  dependencies:
    - setup
  environment:
    MODEL: "{{.PlanModel}}"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== PLAN ==="
      echo "WS=$WS MODEL=$MODEL"
      cd "$WS/repo"

      SLUG=$(printf '%s' "{{.IssueTitle}}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-30)
      PLAN_FILE="PLANS/${SLUG}-{{.IssueNumber}}-plan.md"
      mkdir -p PLANS
      echo "Plan file: $PLAN_FILE"

      cat > /tmp/plan_prompt.txt <<PROMPTEOF
      You are working in a git repository. Read ISSUE_CONTEXT.md for the issue details.

      Create the file $PLAN_FILE with an implementation plan.

      Apply the /ygs-wbs skill methodology if available. Otherwise:
      - Explore the codebase (ls, cat files) to understand architecture and conventions
      - Decompose into ordered vertical-slice tasks, each independently testable
      - Write $PLAN_FILE with: ordered task list, description, files to change, acceptance criteria

      IMPORTANT: On the VERY LAST line of your response, output ONLY this JSON:
      {"status":"DONE","task_count":3,"total_complexity":"M","summary":"one line summary"}
      Complexity values: S=trivial, M=moderate, H=hard, XL=very large
      If you cannot proceed: {"status":"BLOCKED","blocked_reason":"specific reason"}
      PROMPTEOF

      echo "--- Prompt ---"
      cat /tmp/plan_prompt.txt
      echo "---"
      echo "Calling claude (model=$MODEL, max-turns=30)..."

      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/plan_prompt.txt 30 "$TASK_DIR/plan_conversation.txt")

      echo ""
      echo "=== claude done ==="
      echo "--- git status after plan ---"
      git status
      echo "--- $PLAN_FILE ---"
      cat "$PLAN_FILE" 2>/dev/null || cat PLAN.md 2>/dev/null || echo "(plan file not created)"

      printf '%s\n' "$STATUS_JSON" > "$TASK_DIR/plan_result.json"
      echo "Plan result: $STATUS_JSON"

      cp "$PLAN_FILE" "$TASK_DIR/plan_summary.md" 2>/dev/null \
        || cp PLAN.md "$TASK_DIR/plan_summary.md" 2>/dev/null \
        || echo "(no plan file)" > "$TASK_DIR/plan_summary.md"

      # Complexity-based model selection: S/L→haiku, M→default, H/XL→opus
      COMPLEXITY=$(echo "$STATUS_JSON" | jq -r '.total_complexity // "M"')
      case "$COMPLEXITY" in
        S|L) CHOSEN_MODEL="claude-haiku-4-5-20251001" ;;
        M)   CHOSEN_MODEL="{{.ImplementModel}}" ;;
        H|XL) CHOSEN_MODEL="claude-opus-4-8" ;;
        *)   CHOSEN_MODEL="{{.ImplementModel}}" ;;
      esac
      echo "Complexity=$COMPLEXITY → DerivedImplementModel=$CHOSEN_MODEL"
      echo "::set-output name=DerivedImplementModel::$CHOSEN_MODEL"
      echo "DerivedImplementModel=$CHOSEN_MODEL" >> "$TASK_DIR/meta.env"

      STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "DONE"')
      [ "$STATUS" = "BLOCKED" ] && exit 2
      exit 0
  artifacts:
    paths:
      - plan_result.json
      - plan_summary.md
      - plan_conversation.txt
      - meta.env
    when: always
  on_exit_code:
    COMPLETED: implement
    "2": notify-blocked
  on_failed: analyze-failure

# --- IMPLEMENT ---------------------------------------------------------------
- task_type: implement
  method: SHELL
  timeout: 45m
  report_stdout: true
  dependencies:
    - setup
    - plan
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      # Use complexity-derived model if available, else fall back to job variable
      MODEL="${DerivedImplementModel:-{{.ImplementModel}}}"
      echo "=== IMPLEMENT ==="
      echo "WS=$WS MODEL=$MODEL"
      cd "$WS/repo"

      echo "--- workspace state ---"
      ls -la
      SLUG=$(printf '%s' "{{.IssueTitle}}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-30)
      PLAN_FILE="PLANS/${SLUG}-{{.IssueNumber}}-plan.md"
      [ ! -f "$PLAN_FILE" ] && PLAN_FILE="PLAN.md"
      echo "--- $PLAN_FILE ---"
      cat "$PLAN_FILE" 2>/dev/null || echo "(no plan file)"
      echo "--- ISSUE_CONTEXT.md ---"
      cat ISSUE_CONTEXT.md 2>/dev/null || echo "(no ISSUE_CONTEXT.md)"
      echo "---"

      cat > /tmp/impl_prompt.txt <<PROMPTEOF
      You are working in a git repository. Implement the plan for the issue.

      Read ISSUE_CONTEXT.md for the issue and $PLAN_FILE for the plan.

      Apply the /ygs-implement skill methodology if available. Otherwise:
      - Execute each task in the plan file in order
      - Actually create/modify the files using your tools
      - Run existing tests after each task if a test runner is available
      - Make atomic git commits after each task: git add -A && git commit -m "task: description"
      - If tests fail after 2 fix attempts: stop and report TESTS_FAILING
      - If blocked: stop and report BLOCKED
      - Do NOT add features beyond the plan

      IMPORTANT: You MUST make actual file changes and git commits.
      On the VERY LAST line of your response, output ONLY this JSON:
      {"status":"DONE","files_changed":["file1.go"],"commits":2,"tests_status":"passing"}
      If blocked: {"status":"BLOCKED","blocked_reason":"reason"}
      If tests failing: {"status":"TESTS_FAILING","failing_tests":["TestFoo"]}
      PROMPTEOF

      echo "Calling claude (model=$MODEL, max-turns=100)..."
      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/impl_prompt.txt 100 "$TASK_DIR/impl_conversation.txt")

      echo ""
      echo "=== claude done ==="

      # If claude made changes but forgot to commit, commit them now
      if [ -n "$(git status --porcelain)" ]; then
        echo "--- uncommitted changes detected, committing ---"
        git add -A
        git commit -m "implement: changes from AI agent" || true
      fi

      echo "--- git log (commits on branch) ---"
      git log --oneline {{.GitBranch}}..HEAD 2>/dev/null || git log --oneline -5
      echo "--- git diff --stat ---"
      git diff --stat {{.GitBranch}} 2>/dev/null || true
      echo "--- git status ---"
      git status

      git diff {{.GitBranch}} > "$TASK_DIR/impl_diff.patch" 2>/dev/null || true
      git log --oneline {{.GitBranch}}..HEAD > "$TASK_DIR/impl_commits.txt" 2>/dev/null || true

      printf '%s\n' "$STATUS_JSON" > "$TASK_DIR/impl_result.json"
      echo "Impl result: $STATUS_JSON"

      STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "DONE"')
      echo "=== IMPLEMENT STATUS: $STATUS ==="
      [ "$STATUS" = "BLOCKED" ] && exit 2
      [ "$STATUS" = "TESTS_FAILING" ] && exit 3
      exit 0
  artifacts:
    paths:
      - impl_result.json
      - impl_conversation.txt
      - impl_diff.patch
      - impl_commits.txt
    when: always
  on_exit_code:
    COMPLETED: unit-test
    "2": notify-blocked
    "3": fix-tests
  on_failed: analyze-failure

# --- UNIT-TEST ---------------------------------------------------------------
- task_type: unit-test
  method: SHELL
  timeout: 10m
  report_stdout: true
  dependencies:
    - setup
    - implement
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=========================================="
      echo "=== UNIT-TEST: Verify changes + run tests ==="
      echo "=========================================="
      cd "$WS/repo"

      echo ""
      echo "--- Commits on branch ---"
      git log --oneline {{.GitBranch}}..HEAD 2>/dev/null || echo "(none)"

      COMMIT_COUNT=$(git rev-list --count {{.GitBranch}}..HEAD 2>/dev/null || echo "0")
      echo "Total commits: $COMMIT_COUNT"

      if [ "$COMMIT_COUNT" -eq 0 ]; then
        echo ""
        echo "!!! ERROR: No commits were made by implement task !!!"
        echo "Check impl_conversation.txt artifact for details."
        exit 1
      fi

      echo ""
      echo "--- Files changed ---"
      git diff --stat {{.GitBranch}} 2>/dev/null || echo "(no diff)"

      echo ""
      echo "--- Directory listing ---"
      find . -not -path './.git/*' -not -path './target/*' -not -path './node_modules/*' \
        -type f | sort | head -50

      echo ""
      echo "=== Running tests ==="
      TEST_EXIT=0

      if [ -f "Makefile" ] && grep -q "^test:" Makefile; then
        echo "Found Makefile with test target"
        make test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "Cargo.toml" ]; then
        echo "Found Cargo.toml - running cargo test"
        cargo test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "package.json" ]; then
        echo "Found package.json - running npm test"
        npm install 2>&1 | tail -5
        npm test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "go.mod" ]; then
        echo "Found go.mod - running go test"
        go test ./... 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
        echo "Found Python project - running pytest"
        pip install -e . 2>/dev/null || true
        pytest 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      else
        echo "No recognized test runner found - skipping tests"
        echo "skipped" > "$TASK_DIR/test_output.txt"
      fi

      echo ""
      echo "Test exit code: $TEST_EXIT"

      git diff {{.GitBranch}} > "$TASK_DIR/verify_diff.patch" 2>/dev/null || true
      git log --format="%h %s" {{.GitBranch}}..HEAD > "$TASK_DIR/verify_commits.txt" 2>/dev/null || true

      echo ""
      if [ $TEST_EXIT -ne 0 ]; then
        echo "=== UNIT-TEST FAILED (exit=$TEST_EXIT) ==="
        exit 3
      fi
      echo "=== UNIT-TEST PASSED: $COMMIT_COUNT commit(s), tests green ==="
  artifacts:
    paths:
      - verify_diff.patch
      - verify_commits.txt
      - test_output.txt
    when: always
  on_exit_code:
    COMPLETED: self-verify
    "3": fix-tests
  on_failed: notify-blocked

# --- FIX-TESTS ---------------------------------------------------------------
- task_type: fix-tests
  method: SHELL
  timeout: 20m
  retry: 2
  delay_between_retries: 30s
  report_stdout: true
  dependencies:
    - setup
    - implement
    - unit-test
  environment:
    MODEL: "{{.ImplementModel}}"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== FIX-TESTS ==="
      echo "WS=$WS"
      cd "$WS/repo"

      # Read actual test output from unit-test artifact (not impl_result.json)
      FAILING=$(grep -E "^FAIL|^--- FAIL|error\[|^Error:|FAILED" \
        "$TASK_DIR/test_output.txt" 2>/dev/null | head -20 \
        || tail -30 "$TASK_DIR/test_output.txt" 2>/dev/null \
        || echo "see test_output.txt")
      echo "Failing test output:"
      echo "$FAILING"

      {
        printf 'Tests are failing. Fix them.\n\n'
        printf 'Failing test output:\n%s\n\n' "$FAILING"
        printf 'Instructions:\n'
        printf '1. Run the test suite to see current output\n'
        printf '2. Read each error carefully - do not guess the cause\n'
        printf '3. Fix the root cause\n'
        printf '4. Re-run to verify\n'
        printf '5. git add -A && git commit -m "fix: tests ..."\n\n'
        printf 'On the LAST line output ONLY: {"status":"DONE","fixed_tests":["TestFoo"]}\n'
        printf 'If still failing: {"status":"STILL_FAILING","still_failing":["TestFoo"]}\n'
      } > /tmp/fix_prompt.txt

      echo "Calling claude (model=$MODEL, max-turns=50)..."
      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/fix_prompt.txt 50 "$TASK_DIR/fix_conversation.txt")

      printf '%s\n' "$STATUS_JSON" > "$TASK_DIR/fix_result.json"
      STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "DONE"')
      echo "Fix-tests agent status: $STATUS"

      # Re-run tests inline to verify the fix actually worked
      echo ""
      echo "=== Re-running tests to verify fix ==="
      TEST_EXIT=0
      if [ -f "Makefile" ] && grep -q "^test:" Makefile; then
        make test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "Cargo.toml" ]; then
        cargo test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "package.json" ]; then
        npm test 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "go.mod" ]; then
        go test ./... 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
        pytest 2>&1 | tee "$TASK_DIR/test_output.txt" || TEST_EXIT=$?
      fi

      echo "Test re-run exit: $TEST_EXIT"
      # Exit 1 triggers formicary retry (up to retry: 2 = 3 total attempts)
      [ $TEST_EXIT -ne 0 ] && exit 1
      exit 0
  artifacts:
    paths:
      - fix_result.json
      - fix_conversation.txt
      - test_output.txt
    when: always
  on_completed: self-verify
  on_failed: notify-blocked

# --- SELF-VERIFY (AI reviews its own work) -----------------------------------
- task_type: self-verify
  method: SHELL
  timeout: 15m
  report_stdout: true
  dependencies:
    - setup
    - implement
  environment:
    MODEL: "{{.ReviewModel}}"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== SELF-VERIFY ==="
      echo "WS=$WS"
      cd "$WS/repo"

      echo "--- commits to verify ---"
      git log --oneline {{.GitBranch}}..HEAD 2>/dev/null || echo "(no commits)"
      echo "--- diff stat ---"
      git diff --stat {{.GitBranch}} 2>/dev/null || echo "(no diff)"
      DIFF_SIZE=$(git diff {{.GitBranch}} 2>/dev/null | wc -l || echo "0")
      echo "Diff lines: $DIFF_SIZE"

      if [ "$DIFF_SIZE" -lt 2 ]; then
        echo "No changes to verify - skipping"
        printf '{"status":"SKIPPED","reason":"no changes","critical_findings":0,"fixes_applied":0}\n' \
          > "$TASK_DIR/verify_result.json"
        echo "No changes to verify" > "$TASK_DIR/verify_conversation.txt"
        exit 0
      fi

      cat > /tmp/verify_prompt.txt <<'PROMPTEOF'
      You are verifying changes made by an AI implementation agent on this branch.
      Your job is to catch real problems before this becomes a PR.

      Apply the /ygs-code-review skill methodology if available. Otherwise:

      Step 1 - Run tests:
      - Find and run the project test suite (make test, npm test, go test, pytest, etc.)
      - Report pass/fail with output

      Step 2 - Check correctness (MUST FIX if found):
      - Logic bugs: wrong conditions, off-by-one, nil/null dereference, wrong return values
      - Security: SQL injection, XSS, hardcoded secrets, path traversal
      - Missing error handling at I/O boundaries (network, file, DB)
      - Incomplete implementation: does the code actually solve the issue in ISSUE_CONTEXT.md?
      - For each problem: explain it clearly, fix it, then: git add -A && git commit -m "verify: fix <problem>"

      Step 3 - Summary:
      - List what you verified, what passed, what you fixed

      On the LAST line output ONLY:
      {"status":"PASS","tests_pass":true,"critical_findings":0,"fixes_applied":0,"summary":"all tests pass, implementation correct"}
      If you fixed issues: {"status":"FIXED","tests_pass":true,"critical_findings":2,"fixes_applied":2,"summary":"fixed null check and missing error handling"}
      If tests fail and you cannot fix: {"status":"TESTS_FAILING","tests_pass":false,"critical_findings":1,"fixes_applied":0,"summary":"integration test fails due to missing DB migration"}
      PROMPTEOF

      echo "Calling claude for self-verify (model=$MODEL, max-turns=30)..."
      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/verify_prompt.txt 30 "$TASK_DIR/verify_conversation.txt")

      printf '%s\n' "$STATUS_JSON" > "$TASK_DIR/verify_result.json"
      echo ""
      echo "--- Self-verify result ---"
      cat "$TASK_DIR/verify_result.json"
      echo ""
      echo "--- final git log ---"
      git log --oneline {{.GitBranch}}..HEAD 2>/dev/null || echo "(no commits)"
      echo "--- final diff stat ---"
      git diff --stat {{.GitBranch}} 2>/dev/null || true
  artifacts:
    paths:
      - verify_result.json
      - verify_conversation.txt
    when: always
  on_completed: create-pr
  on_failed: notify-blocked

# --- CREATE-PR ---------------------------------------------------------------
- task_type: create-pr
  method: SHELL
  timeout: 5m
  report_stdout: true
  dependencies:
    - setup
    - plan
    - self-verify
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== CREATE-PR ==="
      echo "BRANCH=$BRANCH"
      cd "$WS/repo"

      COMMIT_COUNT=$(git rev-list --count {{.GitBranch}}..HEAD 2>/dev/null || echo "0")
      echo "Commits on branch: $COMMIT_COUNT"

      if [ "$COMMIT_COUNT" -eq 0 ]; then
        echo "ERROR: No commits on branch - nothing to push or PR"
        git log --oneline -5
        git status
        exit 1
      fi

      echo "Pushing branch..."
      git push origin "$BRANCH"
      echo "Push successful"

      PLAN_SUMMARY=$(jq -r '.summary // "See PLAN.md"' "$TASK_DIR/plan_result.json" 2>/dev/null \
        || echo "See commits")
      REVIEW_STATUS=$(jq -r '.status // "N/A"' "$TASK_DIR/verify_result.json" 2>/dev/null \
        || echo "N/A")
      IMPL_COMMITS=$(jq -r '.commits // 0' "$TASK_DIR/impl_result.json" 2>/dev/null || echo "0")
      DERIVED_MODEL="${DerivedImplementModel:-{{.ImplementModel}}}"

      printf 'Closes #%s\n\n## Summary\n%s\n\n## Stats\n- Commits: %s\n- Self-verify: %s\n- Models: plan=%s impl=%s verify=%s\n' \
        "{{.IssueNumber}}" "$PLAN_SUMMARY" "$IMPL_COMMITS" "$REVIEW_STATUS" \
        "{{.PlanModel}}" "$DERIVED_MODEL" "{{.ReviewModel}}" > /tmp/pr_body.txt

      echo "Creating PR..."
      PR_URL=$(gh pr create \
        -R "{{.GitHubOrg}}/{{.GitHubRepo}}" \
        --title "AI: {{.IssueTitle}}" \
        --body "$(cat /tmp/pr_body.txt)" \
        --base "{{.GitBranch}}" --head "$BRANCH")

      printf '%s\n' "$PR_URL" > "$TASK_DIR/pr_url.txt"
      PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
      echo "::set-output name=PRNumber::$PR_NUM"
      echo "::set-output name=PRUrl::$PR_URL"
      echo "=== PR CREATED: $PR_URL (PR #$PR_NUM) ==="

      gh issue edit "{{.IssueNumber}}" -R "{{.GitHubOrg}}/{{.GitHubRepo}}" \
        --remove-label "ai-in-progress" --add-label "ai-pr-open" 2>/dev/null || true

      # Write processed-comments sentinel so check-pr-status starts clean
      touch "$WS/.processed_comments"
  artifacts:
    paths:
      - pr_url.txt
    when: always
  on_completed: check-pr-status
  on_failed: cleanup

# --- CHECK-PR-STATUS (sensor loop) -------------------------------------------
# Native Formicary sensor pattern: exit code EXECUTING re-runs this task after
# delay_between_retries (2 min). No external watcher or coordinator needed.
# allow_start_if_completed: true ensures this task re-runs on RESTART_JOB.
- task_type: check-pr-status
  method: SHELL
  timeout: 3m
  report_stdout: true
  allow_start_if_completed: true
  allow_failure: true
  delay_between_retries: 120s
  dependencies:
    - setup
    - create-pr
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      REPO="{{.GitHubOrg}}/{{.GitHubRepo}}"
      PR_NUMBER=$(cat "$TASK_DIR/pr_url.txt" 2>/dev/null | grep -oE '[0-9]+$' || echo "")
      PROCESSED_FILE="$WS/.processed_comments"
      echo "=== CHECK-PR-STATUS ==="
      echo "PR: #$PR_NUMBER in $REPO"

      if [ -z "$PR_NUMBER" ]; then
        echo "ERROR: No PR number found"
        exit 1
      fi

      touch "$PROCESSED_FILE"
      LAST_CHECKED_FILE="$WS/.last_checked_ts"
      # Read timestamp of last poll; default to PR creation time if not set
      LAST_CHECKED=$(cat "$LAST_CHECKED_FILE" 2>/dev/null || echo "1970-01-01T00:00:00Z")
      echo "Last checked: $LAST_CHECKED"

      # Check PR state
      PR_STATE=$(gh pr view "$PR_NUMBER" -R "$REPO" --json state -q '.state' 2>/dev/null \
        || echo "UNKNOWN")
      echo "PR #$PR_NUMBER state: $PR_STATE"

      if [ "$PR_STATE" = "MERGED" ]; then
        echo "PR merged — routing to learn"
        exit 3
      fi

      if [ "$PR_STATE" = "CLOSED" ]; then
        echo "PR closed — routing to learn"
        exit 4
      fi

      # Fetch review comments + issue comments newer than last check, filter already-processed.
      # Note: gh api --jq does NOT support --arg; inject timestamp directly into the expression.
      ALL_REVIEW=$(gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
        --jq "[.[] | select(.created_at > \"$LAST_CHECKED\") | {id: (.id | tostring), body, path, user: .user.login}]" \
        2>/dev/null || echo "[]")
      ALL_ISSUE=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
        --jq "[.[] | select(.created_at > \"$LAST_CHECKED\") | {id: (.id | tostring), body, path: \"\", user: .user.login}]" \
        2>/dev/null || echo "[]")

      PROCESSED=$(cat "$PROCESSED_FILE" 2>/dev/null || echo "")
      UNPROCESSED=$(echo "$ALL_REVIEW $ALL_ISSUE" | jq -s --arg done "$PROCESSED" '
        add // [] |
        [.[] | select(
          (.id) as $id |
          ($done | split("\n") | map(select(. != "")) | index($id)) == null
        )]
      ' 2>/dev/null || echo "[]")

      COMMENT_COUNT=$(echo "$UNPROCESSED" | jq 'length' 2>/dev/null || echo "0")
      echo "Unprocessed comments since $LAST_CHECKED: $COMMENT_COUNT"

      # Update last-checked timestamp BEFORE routing so the next poll window starts now.
      date -u +%Y-%m-%dT%H:%M:%SZ > "$LAST_CHECKED_FILE"

      # Always write pending_comments.json so the artifact upload never fails
      printf '%s\n' "$UNPROCESSED" > "$TASK_DIR/pending_comments.json"

      if [ "$COMMENT_COUNT" -gt 0 ]; then
        echo "New review comments found — routing to address-feedback"
        exit 2
      fi

      echo "No new activity — polling again in 2 minutes"
      # EXECUTING exit code: Formicary re-runs this task after delay_between_retries
      exit 10
  artifacts:
    paths:
      - pending_comments.json
    when: always
  on_exit_code:
    COMPLETED: learn
    "2": address-feedback
    "3": learn
    "4": learn
    "10": EXECUTING
    # FAILED routes to notify-blocked so genuine errors (expired token, disk full)
    # create a visible issue comment instead of silently entering the learn path.
    FAILED: notify-blocked
  on_failed: notify-blocked

# --- ADDRESS-FEEDBACK --------------------------------------------------------
- task_type: address-feedback
  method: SHELL
  timeout: 25m
  report_stdout: true
  dependencies:
    - setup
    - create-pr
    - check-pr-status
  environment:
    MODEL: "{{.ImplementModel}}"
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      REPO="{{.GitHubOrg}}/{{.GitHubRepo}}"
      PR_NUMBER=$(cat "$TASK_DIR/pr_url.txt" 2>/dev/null | grep -oE '[0-9]+$' || echo "")
      PROCESSED_FILE="$WS/.processed_comments"
      echo "=== ADDRESS-FEEDBACK ==="
      echo "PR: #$PR_NUMBER"
      cd "$WS/repo"

      # Get our own username once — never process our own replies regardless of whether
      # REPLY_ID capture succeeded. This is the structural guard against infinite loops.
      BOT_USER=$(gh api /user -q '.login' 2>/dev/null || echo "")
      echo "Bot user: ${BOT_USER:-unknown}"

      COMMENTS=$(cat "$TASK_DIR/pending_comments.json" 2>/dev/null || echo "[]")
      COMMENT_COUNT=$(echo "$COMMENTS" | jq 'length' 2>/dev/null || echo "0")
      echo "Processing $COMMENT_COUNT comment(s)"

      # Write comments to temp file so the while loop runs in the main shell process
      # (not a pipe subshell) — writes to PROCESSED_FILE stay visible after the loop.
      echo "$COMMENTS" | jq -c '.[]' 2>/dev/null > /tmp/comments_$$.txt || true
      while IFS= read -r comment; do
        COMMENT_ID=$(echo "$comment" | jq -r '.id')
        COMMENT_BODY=$(echo "$comment" | jq -r '.body')
        COMMENT_USER=$(echo "$comment" | jq -r '.user')
        COMMENT_PATH=$(echo "$comment" | jq -r '.path // empty')

        # Skip our own comments — handles the case where REPLY_ID capture failed
        # and the reply wasn't marked processed by the previous iteration.
        if [ -n "$BOT_USER" ] && [ "$COMMENT_USER" = "$BOT_USER" ]; then
          echo "Skipping own reply comment #$COMMENT_ID from $BOT_USER"
          echo "$COMMENT_ID" >> "$PROCESSED_FILE"
          continue
        fi

        echo ""
        echo "--- Comment #$COMMENT_ID from $COMMENT_USER ---"
        [ -n "$COMMENT_PATH" ] && echo "File: $COMMENT_PATH"
        echo "Body: $COMMENT_BODY"

        {
          printf 'A reviewer left a comment on your PR. Address their feedback.\n\n'
          printf 'Reviewer: %s\n' "$COMMENT_USER"
          [ -n "$COMMENT_PATH" ] && printf 'File: %s\n' "$COMMENT_PATH"
          printf 'Comment:\n%s\n\n' "$COMMENT_BODY"
          printf 'Instructions:\n'
          printf '- Make the requested change\n'
          printf '- Run tests if available\n'
          printf '- git add -A && git commit -m "feedback: address %s comment"\n' "$COMMENT_USER"
          printf '- Do NOT make unrequested changes\n'
          printf '\nOn the LAST line output ONLY: {"status":"DONE","commits":1}\n'
        } > /tmp/respond_prompt.txt

        STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/respond_prompt.txt 20 \
          "$TASK_DIR/respond_${COMMENT_ID}.txt")
        echo "Claude result for comment $COMMENT_ID: $STATUS_JSON"

        # Push changes for this comment — log stderr so push failures are visible
        git push origin HEAD 2>&1 && echo "Pushed" || echo "WARNING: push failed or nothing to push"

        # Post reply via API so we capture the new comment ID and immediately
        # mark it processed — belt-and-suspenders alongside the BOT_USER filter above.
        REPLY_JSON=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --method POST \
          --field "body=Addressed feedback from @${COMMENT_USER}. See latest commit." \
          2>&1 || echo "{}")
        REPLY_ID=$(echo "$REPLY_JSON" | jq -r '.id // empty' 2>/dev/null || true)

        # Mark the original comment and our reply as processed
        echo "$COMMENT_ID" >> "$PROCESSED_FILE"
        [ -n "$REPLY_ID" ] && echo "$REPLY_ID" >> "$PROCESSED_FILE"
        echo "Done: comment #$COMMENT_ID (reply: ${REPLY_ID:-n/a})"
      done < /tmp/comments_$$.txt
      rm -f /tmp/comments_$$.txt

      echo ""
      echo "=== ADDRESS-FEEDBACK COMPLETE ==="
      echo "All $COMMENT_COUNT comment(s) processed"
  artifacts:
    paths:
      - "respond_*.txt"
    when: always
  on_exit_code:
    # COMPLETED → RESTART_JOB: job restarts, skips already-completed tasks,
    # re-runs check-pr-status (allow_start_if_completed: true) to poll again.
    # Loop: address-feedback completes → RESTART_JOB → check-pr-status → repeat
    # until PR is merged/closed. Fix in job_supervisor.go handles status-based
    # special actions that GetNextTask cannot resolve as task names.
    COMPLETED: RESTART_JOB
  on_failed: learn

# --- LEARN -------------------------------------------------------------------
- task_type: learn
  method: SHELL
  timeout: 10m
  report_stdout: true
  dependencies:
    - setup
    - create-pr
  environment:
    MODEL: "{{.ReviewModel}}"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== LEARN ==="
      cd "$WS/repo"
      LEARN_DIR="$HOME/claude_workspace/learn_context"
      mkdir -p "$LEARN_DIR"

      PR_NUMBER=$(cat "$TASK_DIR/pr_url.txt" 2>/dev/null | grep -oE '[0-9]+$' || echo "")
      echo "PR: #$PR_NUMBER"

      PR_COMMENTS=""
      ISSUE_COMMENTS=""
      if [ -n "$PR_NUMBER" ]; then
        PR_COMMENTS=$(gh api "repos/{{.GitHubOrg}}/{{.GitHubRepo}}/pulls/$PR_NUMBER/comments" \
          --jq '[.[] | {user: .user.login, body: .body}]' 2>/dev/null || echo "[]")
        ISSUE_COMMENTS=$(gh api "repos/{{.GitHubOrg}}/{{.GitHubRepo}}/issues/$PR_NUMBER/comments" \
          --jq '[.[] | {user: .user.login, body: .body}]' 2>/dev/null || echo "[]")
      fi

      {
        printf 'Review the PR lifecycle for issue #{{.IssueNumber}} and extract learnings.\n\n'
        printf 'PR review comments:\n%s\n\n' "$PR_COMMENTS"
        printf 'Issue comments:\n%s\n\n' "$ISSUE_COMMENTS"
        printf 'Apply the /ygs-learn skill methodology if available. Otherwise:\n'
        printf '- What went well in this implementation?\n'
        printf '- What reviewer feedback indicated a gap in the AI approach?\n'
        printf '- What patterns should be repeated? What should be avoided?\n'
        printf '- Are there codebase conventions the AI missed?\n\n'
        printf 'Write a concise learning entry (max 20 lines) to:\n'
        printf '  %s/{{.GitHubOrg}}_{{.GitHubRepo}}_issue{{.IssueNumber}}.md\n\n' "$LEARN_DIR"
        printf 'Format:\n# Issue #{{.IssueNumber}}: {{.IssueTitle}}\n'
        printf '## What went well\n## What to improve\n## Patterns to remember\n\n'
        printf 'On the LAST line output: {"status":"DONE","learnings_file":"path"}\n'
      } > /tmp/learn_prompt.txt

      echo "Calling claude for learning capture..."
      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/learn_prompt.txt 10 "$TASK_DIR/learn_conversation.txt")
      echo "Learn result: $STATUS_JSON"

      echo ""
      echo "=== LEARN COMPLETE ==="
      ls -la "$LEARN_DIR/" 2>/dev/null || echo "(empty)"
  artifacts:
    paths:
      - learn_conversation.txt
    when: always
  on_completed: cleanup
  on_failed: cleanup

# --- ANALYZE-FAILURE (AI categorizes unexpected failures) --------------------
# Runs when plan or implement fail unexpectedly (not a clean BLOCKED exit).
# Enriches the blocked_reason before notify-blocked posts to the issue.
- task_type: analyze-failure
  method: SHELL
  timeout: 5m
  report_stdout: true
  dependencies:
    - setup
  environment:
    MODEL: "{{.PlanModel}}"
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      source "$TASK_DIR/meta.env"
      echo "=== ANALYZE-FAILURE ==="

      # Read last 100 lines of whichever conversation artifact exists
      LAST_OUTPUT=$(tail -100 "$TASK_DIR/impl_conversation.txt" 2>/dev/null \
        || tail -100 "$TASK_DIR/plan_conversation.txt" 2>/dev/null \
        || echo "no conversation output captured")

      # Write prompt via printf — never use an unquoted heredoc with untrusted $LAST_OUTPUT
      # as the shell would evaluate backticks/$ inside the heredoc body (RCE risk).
      {
        printf 'An AI agent task failed unexpectedly. Categorize the failure from the output below.\n\n'
        printf 'Last output:\n'
        printf '%s\n\n' "$LAST_OUTPUT"
        printf 'Output ONLY this JSON (no other text):\n'
        printf '{"category":"TRANSIENT","reason":"one line explanation","retry":true}\n\n'
        printf 'category must be one of:\n'
        printf '  TRANSIENT  - network/timeout/infra issue, safe to retry\n'
        printf '  BLOCKED    - missing info or dependency, human must intervene\n'
        printf '  CODE_ERROR - bug in the generated code or test setup\n'
        printf '  TIMEOUT    - agent exceeded max turns or wall-clock limit\n'
      } > /tmp/analyze_prompt.txt

      STATUS_JSON=$(bash "$TASK_DIR/run_agent.sh" /tmp/analyze_prompt.txt 5 "$TASK_DIR/analyze_result.json")
      echo "Analysis: $STATUS_JSON"
      # Write result for notify-blocked to pick up
      printf '%s\n' "$STATUS_JSON" > "$TASK_DIR/analyze_result.json"
  artifacts:
    paths:
      - analyze_result.json
    when: always
  on_completed: notify-blocked
  on_failed: notify-blocked

# --- NOTIFY-BLOCKED ----------------------------------------------------------
- task_type: notify-blocked
  method: SHELL
  timeout: 2m
  report_stdout: true
  script:
    - |
      #!/bin/bash
      TASK_DIR="$PWD"
      echo "=== NOTIFY-BLOCKED ==="

      # Prefer enriched reason from analyze-failure; fall back to plan/impl status JSON
      REASON=$(jq -r '.reason // empty' "$TASK_DIR/analyze_result.json" 2>/dev/null || true)
      if [ -z "$REASON" ]; then
        REASON=$(jq -rs \
          '[.[].blocked_reason?, .[].summary?] | map(select(. != null and . != "")) | first // "Unknown"' \
          "$TASK_DIR/plan_result.json" "$TASK_DIR/impl_result.json" 2>/dev/null || echo "Unknown")
      fi
      [ -z "$REASON" ] && REASON="Unknown - check Formicary job logs"
      echo "Blocked: $REASON"

      CATEGORY=$(jq -r '.category // "UNKNOWN"' "$TASK_DIR/analyze_result.json" 2>/dev/null \
        || echo "UNKNOWN")

      printf '**AI Agent Blocked**\n\nCategory: %s\nReason: %s\n\nPlease fix and re-label as `ai-ready` to retry.\n' \
        "$CATEGORY" "$REASON" > /tmp/blocked_body.txt
      gh issue comment "{{.IssueNumber}}" -R "{{.GitHubOrg}}/{{.GitHubRepo}}" \
        --body "$(cat /tmp/blocked_body.txt)" || true
      gh issue edit "{{.IssueNumber}}" -R "{{.GitHubOrg}}/{{.GitHubRepo}}" \
        --remove-label "ai-in-progress" --add-label "needs-human" 2>/dev/null || true
  on_completed: cleanup
  on_failed: cleanup

# --- CLEANUP (always runs) ---------------------------------------------------
- task_type: cleanup
  method: SHELL
  always_run: true
  timeout: 1m
  report_stdout: true
  script:
    - |
      #!/bin/bash
      WS="$HOME/claude_workspace/{{.GitHubRepo}}-issue{{.IssueNumber}}-{{.Nonce}}"
      echo "=== CLEANUP ==="
      echo "WS=$WS"
      # On K8s with PVC: workspace persists at mount path for manual inspection.
      # On ephemeral SHELL ant: workspace lives at ~/claude_workspace until cleanup cron removes it.
      if [ -d "$WS" ]; then
        echo "Workspace preserved at: $WS"
        find "$WS/repo" -maxdepth 2 -not -path '*/.git/*' | head -30
      else
        echo "Workspace not found (ephemeral container)"
      fi

job_variables:
  PlanModel: "claude-sonnet-4-6"
  ImplementModel: "claude-sonnet-4-6"
  ReviewModel: "claude-sonnet-4-6"
  GitUserName: "Shahzad Bhatti"
  GitUserEmail: "bhatti@plexobject.com"
  GitHubOrg: "bhatti"
  GitHubRepo: "todo-sample"
  GitBranch: "main"
  # IssueNumber, IssueTitle, IssueBodyFile, Nonce set by ai-gh-issue-picker-shell.yaml
