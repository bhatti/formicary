# AI-driven GitHub SDLC pipeline: plan → implement → create-pr → poll-pr
#
# All tasks run inside the ai-dev-tools Docker image — no embedded scripts.
# Artifacts are shared via a mounted workspace volume at /workspace.
# host_network: true enables Tailscale VPN access to the Bedrock proxy.
#
# Prerequisites on the ant worker host:
#   mkdir -p /var/formicary/ai-workspace
#
# Deploy:
#   ./deploy-ai-workflows.sh --set-configs --gh-org YOUR_ORG --gh-repo YOUR_REPO \
#     --gh-token $GITHUB_TOKEN --anthropic-key $ANTHROPIC_API_KEY \
#     --ssh-key "$(cat ~/.ssh/id_rsa)"

job_type: ai-gh-implement
description: "AI agent: plan → implement → create-pr → poll-pr for a GitHub issue"
max_concurrency: 5
timeout: 86400s
required_params:
  - GithubToken
  - GitHubOrg
  - GitHubRepo

variables:
  IssueNumber:
    type: STRING
    required: true

tasks:
# --- PLAN --------------------------------------------------------------------
- task_type: plan
  method: KUBERNETES
  timeout: 15m
  report_stdout: true
  host_network: true
  working_dir: /workspace
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    MAX_TURNS_PLAN: "{{.MaxTurnsPlan}}"
    GIT_USER_NAME: "{{.GitUserName}}"
    GIT_USER_EMAIL: "{{.GitUserEmail}}"
    BASE_BRANCH: "{{.GitBranch}}"
    SSH_PRIVATE_KEY: "{{.SshPrivateKey}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
    AI_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{{.AnthropicOpusModel}}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "{{.AnthropicHaikuModel}}"
  script:
    - python -m scripts.gh.issue_picker --issue-id {{.IssueNumber}}
    - python -m scripts.gh.plan --issue-id {{.IssueNumber}}
  artifacts:
    paths:
      - ./issue.json
      - ./plan.md
      - ./plan_result.json
      - ./logs
    expire_after: 24h
  on_exit_code:
    2: PAUSE_JOB    # BLOCKED — needs human intervention
  on_completed: implement

# --- IMPLEMENT ---------------------------------------------------------------
- task_type: implement
  method: KUBERNETES
  timeout: 45m
  report_stdout: true
  host_network: true
  working_dir: /workspace
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  dependencies:
    - plan
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    MAX_TURNS_IMPLEMENT: "{{.MaxTurnsImplement}}"
    GIT_USER_NAME: "{{.GitUserName}}"
    GIT_USER_EMAIL: "{{.GitUserEmail}}"
    BASE_BRANCH: "{{.GitBranch}}"
    SSH_PRIVATE_KEY: "{{.SshPrivateKey}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
    AI_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{{.AnthropicOpusModel}}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "{{.AnthropicHaikuModel}}"
  script:
    - python -m scripts.gh.implement --issue-id {{.IssueNumber}}
  artifacts:
    paths:
      - ./impl_result.json
      - ./branch.txt
    expire_after: 24h
  on_completed: create-pr

# --- CREATE-PR ---------------------------------------------------------------
- task_type: create-pr
  method: KUBERNETES
  timeout: 10m
  report_stdout: true
  host_network: true
  working_dir: /workspace
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  dependencies:
    - plan
    - implement
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    INPROGRESS_LABEL: "{{.InProgressLabel}}"
    PR_OPEN_LABEL: "{{.PrOpenLabel}}"
    SSH_PRIVATE_KEY: "{{.SshPrivateKey}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
    AI_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{{.AnthropicOpusModel}}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "{{.AnthropicHaikuModel}}"
  script:
    - python -m scripts.gh.create_pr --issue-id {{.IssueNumber}}
  artifacts:
    paths:
      - ./pr.json
    expire_after: 24h
  on_completed: poll-pr

# --- POLL-PR -----------------------------------------------------------------
# poll_pr.py runs once: exits 0 (merged/closed), 3 (still open → PAUSED), 1 (error).
# learn.py is called automatically inside poll_pr on exit 0.
# delay: controls how long formicary waits before re-running this task after PAUSED.
- task_type: poll-pr
  method: KUBERNETES
  report_stdout: true
  host_network: true
  working_dir: /workspace
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  dependencies:
    - create-pr
    - poll-pr
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    NEEDS_HUMAN_LABEL: "{{.NeedsHumanLabel}}"
    MAX_TURNS_FEEDBACK: "{{.MaxTurnsFeedback}}"
    SSH_PRIVATE_KEY: "{{.SshPrivateKey}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
    AI_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{{.AnthropicSonnetModel}}"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{{.AnthropicOpusModel}}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "{{.AnthropicHaikuModel}}"
  script:
    - python -m scripts.gh.poll_pr --issue-id {{.IssueNumber}}
  artifacts:
    paths:
      - ./pr.json
      - ./monitor_result.json
      - ./processed_comments.json
    expire_after: 168h    # 7 days
  on_exit_code:
    3: PAUSE_JOB    # PR still open — formicary waits delay then retries
  on_completed: done
  delay: "{{.PollInterval}}s"

# --- DONE --------------------------------------------------------------------
# Terminal leaf task — poll-pr routes here on success (exit 0).
- task_type: done
  method: SHELL
  script:
    - echo "Pipeline complete"

job_variables:
  MaxTurnsPlan: "50"
  MaxTurnsImplement: "200"
  MaxTurnsFeedback: "20"
  PollInterval: "120"
  GitUserName: "AI Agent"
  GitUserEmail: "ai-agent@noreply.local"
  GitBranch: "main"
  InProgressLabel: "ai-in-progress"
  PrOpenLabel: "ai-pr-open"
  NeedsHumanLabel: "needs-human"
  ClaudeUseBedrock: "1"
  AnthropicBedrockBaseUrl: "http://ai/bedrock"
  ClaudeSkipBedrockAuth: "1"
  AnthropicSonnetModel: "us.anthropic.claude-sonnet-4-6"
  AnthropicOpusModel: "us.anthropic.claude-opus-4-6-v1"
  AnthropicHaikuModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
  # Injected via org configs (set via deploy-ai-workflows.sh --set-configs):
  #   GitHubOrg, GitHubRepo    (plain)
  #   GithubToken, SshPrivateKey (secret)
  # AnthropicApiKey is optional — Bedrock access via Tailscale needs no API key
