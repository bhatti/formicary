# SHELL variant -> runs on a bare ant worker (no Kubernetes required).
# Auth: ant worker inherits ~/.claude/settings.json and `gh auth login` automatically.
#
# Two-task design:
#   gather-issues  -> gh issue list -> exports IssuesJSON context var via ::set-output::
#   submit-jobs    -> SubmitJobsFromJSON template function submits one job per issue (no curl)
#
# Capacity guard uses CountByJobTypeAndState (DB query, no HTTP call) at two levels:
#   - job-level skip_if: skips the entire picker run
#   - submit-jobs env var PENDING_COUNT: rendered before the script runs
job_type: ai-gh-issue-picker
description: "Polls GitHub for issues labeled ai-ready and submits ai-gh-implement jobs"
cron_trigger: "0 * * * * * *"
max_concurrency: 1
timeout: 5m

# skip_if: CountByJobTypeAndState queries the DB directly -> no HTTP call, no token.
# Tracks PENDING only so running jobs don't block new pickups.
skip_if: >-
  {{if ge (CountByJobTypeAndState "ai-gh-implement" "PENDING") 10}} true {{end}}

tasks:
# --- Task 1: Fetch issue metadata from GitHub ---------------------------------
# Fetches open issues labeled PickupLabel, checks for unresolved dependencies,
# writes issues.json, exports IssuesJSON context var, and updates GitHub labels.
#
# Dependency detection: scans issue body for patterns like:
#   "Depends on #N", "Blocked by #N", "depends_on: #N" (case-insensitive)
# Issues with any open dependency are skipped (not leaf nodes).
- task_type: gather-issues
  method: SHELL
  timeout: 3m
  environment:
    # GH_TOKEN is the canonical env var for gh CLI token auth (bypasses keyring).
    # GITHUB_TOKEN is the fallback accepted by older gh versions.
    GH_TOKEN: "{{.GithubToken}}"
    GITHUB_TOKEN: "{{.GithubToken}}"
    MAX_PENDING: "{{.MaxPendingJobs}}"
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    PICKUP_LABEL: "{{.PickupLabel}}"
    INPROGRESS_LABEL: "{{.InProgressLabel}}"
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      [ -f ~/venv/bin/activate ] && source ~/venv/bin/activate || true
      python3 - <<'PYEOF'
      import json, os, subprocess, sys

      gh_org     = os.environ["GH_ORG"]
      gh_repo    = os.environ["GH_REPO"]
      pickup_lbl = os.environ["PICKUP_LABEL"]
      inprog_lbl = os.environ["INPROGRESS_LABEL"]
      max_pending = int(os.environ.get("MAX_PENDING", "10"))
      repo       = f"{gh_org}/{gh_repo}"

      def gh(*args):
          cmd = ["gh"] + list(args)
          r = subprocess.run(cmd, capture_output=True, text=True)
          if r.returncode != 0:
              print(f"gh {' '.join(args)} failed: {r.stderr.strip()}", file=sys.stderr)
          return r

      r = gh("issue", "list", "-R", repo,
             "--label", pickup_lbl, "--state", "open",
             "--limit", str(max_pending),
             "--json", "number,title,url")
      try:
          issues = json.loads(r.stdout) if r.returncode == 0 else []
      except json.JSONDecodeError:
          issues = []

      print(f"Fetched {len(issues)} issue(s) from {repo} (label: {pickup_lbl})")

      for issue in issues:
          num = issue["number"]
          gh("issue", "edit", str(num), "-R", repo,
             "--remove-label", pickup_lbl, "--add-label", inprog_lbl)
          print(f"  Issue #{num}: {issue['title']}")

      issues_json = json.dumps(issues, separators=(',', ':'))
      with open("issues.json", "w") as f:
          f.write(issues_json + "\n")

      print(f"Issues ready for pickup: {len(issues)}")
      print(f"::set-output name=IssuesJSON::{issues_json}")
      PYEOF
  artifacts:
    paths:
      - issues.json
  on_completed: submit-jobs

# --- Task 2: Submit one ai-gh-implement job per issue -------------------------
# SubmitJobsFromJSON is a template function that runs at queen-side render time
# (before the script executes). It reads IssuesJSON from job context (exported
# by gather-issues via ::set-output::) and submits one job per issue directly
# via the DB -- no HTTP calls, no Formicary URL or token needed.
- task_type: submit-jobs
  method: SHELL
  timeout: 1m
  dependencies:
    - gather-issues
  environment:
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    # Rendered at template time: submits one ai-gh-implement job per issue in IssuesJSON.
    # The "if .IssuesJSON" guard prevents a template type error when gather-issues fails and
    # IssuesJSON was never exported to job context (missing key -> nil interface).
    SUBMITTED_IDS: '{{if .IssuesJSON}}{{SubmitJobsFromJSON "ai-gh-implement" .IssuesJSON (printf "GitHubOrg=%s" .GitHubOrg) (printf "GitHubRepo=%s" .GitHubRepo)}}{{end}}'
    # Rendered at template time: current PENDING count for logging.
    PENDING_COUNT: '{{CountByJobTypeAndState "ai-gh-implement" "PENDING"}}'
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      LOG="picker_{{.JobID}}.log"
      {
        echo "=== Issue Picker submit: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
        echo "Submitted job IDs: ${SUBMITTED_IDS:-none}"
        echo "Current PENDING count: ${PENDING_COUNT}"
      } | tee "${LOG}"
  artifacts:
    paths:
      - "picker_{{.JobID}}.log"
    when: always

job_variables:
  MaxPendingJobs: "10"
  PickupLabel: "ai-ready"
  InProgressLabel: "ai-in-progress"
  # GitHubOrg, GitHubRepo, GithubToken -> set via org or job configs
