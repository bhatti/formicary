# Polls GitHub for issues labeled ai-ready and submits ai-gh-implement jobs.
#
# gather-issues: runs ai-dev-tools image, writes /workspace/{issue_id}/issue.json
#   per issue, and emits ::set-output name=IssuesJSON:: with a JSON array.
# submit-jobs: uses SubmitJobsFromJSON to fan out one ai-gh-implement job per issue.
#
# Reserved fields in each IssuesJSON entry:
#   _description  -> sets the job request description in the Formicary dashboard
#   _user_key     -> dedup key; prevents re-submitting the same issue on repeat runs
#
# Deploy:
#   ./deploy-ai-workflows.sh --set-configs --gh-org YOUR_ORG --gh-repo YOUR_REPO \
#     --gh-token $GITHUB_TOKEN --anthropic-key $ANTHROPIC_API_KEY

job_type: ai-gh-issue-picker
description: "Polls GitHub for issues labeled ai-ready and submits ai-gh-implement jobs"
cron_trigger: "*/5 * * * *"
timeout: 5m
max_concurrency: 1
required_params:
  - GithubToken
  - GitHubOrg
  - GitHubRepo

skip_if: >-
  {{if ge (CountByJobTypeAndState "ai-gh-implement" "PENDING" "EXECUTING") 10}} true {{end}}

tasks:
- task_type: gather-issues
  method: KUBERNETES
  timeout: 3m
  report_stdout: true
  host_network: true
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  environment:
    WORKSPACE_DIR: /workspace
    GH_ORG: "{{.GitHubOrg}}"
    GH_REPO: "{{.GitHubRepo}}"
    GH_TOKEN: "{{.GithubToken}}"
    PICKUP_LABEL: "{{.PickupLabel}}"
    INPROGRESS_LABEL: "{{.InProgressLabel}}"
    MAX_ISSUES: "{{.MaxIssues}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
  script:
    - python -m scripts.gh.issue_picker
  on_exit_code:
    2: COMPLETED    # No issues found — not an error
  on_completed: submit-jobs

- task_type: submit-jobs
  method: SHELL
  timeout: 1m
  report_stdout: true
  dependencies:
    - gather-issues
  environment:
    SUBMITTED_IDS: '{{if .IssuesJSON}}{{SubmitJobsFromJSON "ai-gh-implement" .IssuesJSON (printf "_parent_id=%s" .JobID)}}{{end}}'
    PENDING_COUNT: '{{CountByJobTypeAndState "ai-gh-implement" "PENDING"}}'
    ISSUES_JSON: '{{.IssuesJSON}}'
  script:
    - echo "=== Issue Picker Submit ==="
    - echo "Issues found ${ISSUES_JSON:-none}, pending=${PENDING_COUNT}, submitted=${SUBMITTED_IDS:-none}"

job_variables:
  MaxIssues: "5"
  PickupLabel: "ai-ready"
  InProgressLabel: "ai-in-progress"
  ClaudeUseBedrock: "1"
  AnthropicBedrockBaseUrl: "http://ai/bedrock"
  ClaudeSkipBedrockAuth: "1"
  # Injected via org configs (set via deploy-ai-workflows.sh --set-configs):
  #   GitHubOrg, GitHubRepo  (plain)
  #   GithubToken            (secret)
  # AnthropicApiKey is optional — Bedrock access via Tailscale needs no API key
