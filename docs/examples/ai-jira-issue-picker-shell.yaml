# Jira/Bitbucket variant — polls Jira for issues labeled for AI pickup.
# Auth: acli configured at ~/.config/acli/config.json with jira + bitbucket profiles.
#
# Uses acli CLI (Atlassian CLI) instead of gh CLI.
# Label convention: ai-ready → ai-in-progress → ai-pr-open → needs-human

job_type: ai-jira-issue-picker
sem_version: "1.0"
description: "Polls Jira for ai-ready issues and submits ai-jira-implement jobs"
cron_trigger: "0 * * * * * *"
max_concurrency: 1
timeout: 5m

# Two-layer capacity gate: skip the entire picker if too many jobs are already running.
# Counts both PENDING (queued) and EXECUTING (active) to avoid over-submitting.
skip_if: >-
  {{$p := CountByJobTypeAndState "ai-jira-implement" "PENDING"}}
  {{$e := CountByJobTypeAndState "ai-jira-implement" "EXECUTING"}}
  {{if ge (Add $p $e) 10}} true {{end}}

tasks:
- task_type: gather-issues
  method: SHELL
  timeout: 3m
  report_stdout: true
  environment:
    JIRA_PROJECT: "{{.JiraProject}}"
    PICKUP_LABEL: "{{.PickupLabel}}"
    INPROGRESS_LABEL: "{{.InProgressLabel}}"
    MAX_PENDING: "{{.MaxPendingJobs}}"
    BB_WORKSPACE: "{{.BitbucketWorkspace}}"
    BB_REPO: "{{.BitbucketRepo}}"
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      python3 - <<'PYEOF'
      import json, os, subprocess, sys

      project      = os.environ["JIRA_PROJECT"]
      pickup_lbl   = os.environ["PICKUP_LABEL"]
      inprog_lbl   = os.environ["INPROGRESS_LABEL"]
      max_pending  = int(os.environ.get("MAX_PENDING", "10"))
      bb_workspace = os.environ["BB_WORKSPACE"]
      bb_repo      = os.environ["BB_REPO"]

      def acli(*args):
          profile = "bitbucket" if args and args[0] == "bitbucket" else "jira"
          cmd = ["acli", "-p", profile] + list(args)
          r = subprocess.run(cmd, capture_output=True, text=True)
          if r.returncode != 0:
              print(f"acli {' '.join(args[:4])} failed: {r.stderr.strip()}", file=sys.stderr)
          return r

      def adf_to_text(node):
          """Recursively extract plain text from Atlassian Document Format."""
          if not node or not isinstance(node, dict):
              return ""
          if node.get("type") == "text":
              return node.get("text", "")
          parts = [adf_to_text(c) for c in node.get("content", [])]
          sep = "\n" if node.get("type") in ("paragraph", "heading", "listItem", "bulletList", "orderedList") else ""
          return sep.join(p for p in parts if p)

      # Search Jira for issues with pickup label
      # Issues must have "ai-ready" label AND a "repo:<name>:<branch>" label
      # e.g. labels: ai-ready, repo:my-service:develop
      jql = f'project = {project} AND labels = "{pickup_lbl}" AND status != Done ORDER BY priority DESC'
      r = acli("jira", "search", "--jql", jql, "--max-results", str(max_pending),
               "--fields", "summary,description,labels", "-o", "json")
      try:
          data = json.loads(r.stdout) if r.returncode == 0 else {}
          issues = data.get("issues", []) if isinstance(data, dict) else []
      except json.JSONDecodeError:
          issues = []

      print(f"Fetched {len(issues)} issue(s) from {project} (label: {pickup_lbl})")

      import re
      repo_label_re = re.compile(r"^repo:([^:]+):(.+)$")

      items = []
      for issue in issues:
          key = issue.get("key", "")
          fields = issue.get("fields", {})
          summary = fields.get("summary", "")
          desc_raw = fields.get("description", "")
          description = adf_to_text(desc_raw) if isinstance(desc_raw, dict) else (desc_raw or "")
          url = issue.get("self", "")
          labels = fields.get("labels", [])

          # Extract repo and branch from "repo:<name>:<branch>" label
          issue_repo = bb_repo        # default from job variables
          issue_branch = "main"       # default branch
          for lbl in labels:
              lbl_str = lbl if isinstance(lbl, str) else lbl.get("name", "")
              m = repo_label_re.match(lbl_str)
              if m:
                  issue_repo = m.group(1)
                  issue_branch = m.group(2)
                  break

          nonce = subprocess.check_output(
              ["bash", "-c", "head -c 4 /dev/urandom | xxd -p"], text=True).strip()

          # Move label: replace full label list (acli edit --labels sets all labels)
          new_labels = [l for l in labels if l != pickup_lbl] + [inprog_lbl]
          acli("jira", "issue", "edit", key, "--labels", ",".join(new_labels))
          print(f"  {key}: {summary} (repo={issue_repo}, branch={issue_branch})")

          # Sanitize title: strip Go template markers and control chars so it is
          # safe to embed directly in YAML templates without any encoding.
          safe_title = re.sub(r'[{}\x00-\x1f\x7f]', ' ', summary).strip()

          # Write body to a per-issue file; implement reads it from the artifact.
          # This avoids encoding entirely — Claude gets the full unmodified body.
          body_file = f"issue_body_{key}.txt"
          with open(body_file, "w") as bf:
              bf.write(description or "")

          items.append({
              "IssueNumber": key,
              "IssueTitle": safe_title,
              "IssueBodyFile": body_file,
              "IssueURL": url,
              "Nonce": nonce,
              "BitbucketWorkspace": bb_workspace,
              "BitbucketRepo": issue_repo,
              "GitBranch": issue_branch,
              "JiraProject": project,
              "_description": f"{key}: {summary} ({issue_repo}:{issue_branch})",
              "_user_key": f"ai-jira-implement-{bb_workspace}-{issue_repo}-{key}",
          })

      items_json = json.dumps(items, separators=(",", ":"))
      with open("issues.json", "w") as f:
          f.write(items_json + "\n")

      print("items.json written: {} item(s)".format(len(items)))
      print("::set-output name=IssuesJSON::{}".format(items_json))
      print("::set-output name=IssueCount::{}".format(len(items)))
      PYEOF
  artifacts:
    paths:
      - issues.json
      - "issue_body_*.txt"
  on_completed: submit-jobs

- task_type: submit-jobs
  method: SHELL
  timeout: 1m
  report_stdout: true
  dependencies:
    - gather-issues
  environment:
    ISSUE_COUNT:   '{{.IssueCount}}'
    SUBMITTED_IDS: '{{if .IssuesJSON}}{{SubmitJobsFromJSON "ai-jira-implement" .IssuesJSON (printf "_parent_id=%s" .JobID)}}{{end}}'
    PENDING_COUNT: '{{CountByJobTypeAndState "ai-jira-implement" "PENDING"}}'
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      echo "=== Jira Issue Picker Submit: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
      echo "Issues found: ${ISSUE_COUNT:-0}"
      [ -f issues.json ] && python3 -c "import json; [print('  {} ({}/{})'.format(it.get('IssueNumber','?'),it.get('BitbucketWorkspace','?'),it.get('BitbucketRepo','?'))) for it in json.load(open('issues.json'))]" 2>/dev/null || true
      # Fail immediately if SubmitJobsFromJSON returned an error sentinel
      case "${SUBMITTED_IDS:-}" in
        ERROR:*) echo "ERROR: job submission failed: ${SUBMITTED_IDS}" >&2; exit 1 ;;
      esac

      if [ -n "${SUBMITTED_IDS:-}" ]; then
        echo "Submitted job IDs:"
        echo "$SUBMITTED_IDS" | while read -r id; do
          [ -n "$id" ] && echo "  - $id"
        done
        echo "::set-output name=SubmittedIDs::${SUBMITTED_IDS}"
      else
        echo "No jobs submitted"
        if [ "${ISSUE_COUNT:-0}" -gt 0 ]; then
          echo "ERROR: found ${ISSUE_COUNT} issue(s) but submitted 0 jobs — check server logs for SubmitJobsFromJSON errors" >&2
          exit 1
        fi
      fi
      echo "Pending count: ${PENDING_COUNT}"

job_variables:
  MaxPendingJobs: "10"
  PickupLabel: "ai-ready"
  InProgressLabel: "ai-in-progress"
  JiraProject: "PROJ"
  BitbucketWorkspace: "myworkspace"
  BitbucketRepo: "myrepo"
