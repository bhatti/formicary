# Polls Jira for issues labeled ai-ready and submits ai-jira-implement jobs.
#
# gather-issues: runs ai-dev-tools image, writes /workspace/{issue_id}/issue.json
#   per issue, and emits ::set-output name=IssuesJSON:: with a JSON array.
# submit-jobs: uses SubmitJobsFromJSON to fan out one ai-jira-implement job per issue.
#
# Label convention: ai-ready → ai-in-progress → ai-pr-open → needs-human
#
# Deploy:
#   ./deploy-ai-jira-workflows.sh --set-configs \
#     --jira-project MYPROJ --bb-workspace myworkspace --bb-repo myrepo \
#     --anthropic-key $ANTHROPIC_API_KEY

job_type: ai-jira-issue-picker
description: "Polls Jira for ai-ready issues and submits ai-jira-implement jobs"
cron_trigger: "*/5 * * * *"
timeout: 5m
max_concurrency: 1
required_params:
  - JiraApiToken
  - JiraEmail
  - JiraUrl
  - JiraProject

skip_if: >-
  {{if ge (CountByJobTypeAndState "ai-jira-implement" "PENDING" "EXECUTING") 10}} true {{end}}

tasks:
- task_type: gather-issues
  method: KUBERNETES
  timeout: 3m
  report_stdout: true
  host_network: true
  container:
    image: plexobject/ai-dev-tools:latest
    volumes:
      empty_dir:
        - name: workspace
          mount_path: /workspace
  environment:
    WORKSPACE_DIR: /workspace
    JIRA_BASE_URL: "{{.JiraUrl}}"
    JIRA_EMAIL: "{{.JiraEmail}}"
    JIRA_API_TOKEN: "{{.JiraApiToken}}"
    JIRA_PROJECT: "{{.JiraProject}}"
    BITBUCKET_WORKSPACE: "{{.BitbucketWorkspace}}"
    BITBUCKET_REPO: "{{.BitbucketRepo}}"
    PICKUP_LABEL: "{{.PickupLabel}}"
    INPROGRESS_LABEL: "{{.InProgressLabel}}"
    MAX_ISSUES: "{{.MaxIssues}}"
    CLAUDE_CODE_USE_BEDROCK: "{{.ClaudeUseBedrock}}"
    ANTHROPIC_BEDROCK_BASE_URL: "{{.AnthropicBedrockBaseUrl}}"
    CLAUDE_CODE_SKIP_BEDROCK_AUTH: "{{.ClaudeSkipBedrockAuth}}"
    ANTHROPIC_API_KEY: "{{.AnthropicApiKey}}"
  script:
    - python -m scripts.jira.issue_picker
  on_exit_code:
    2: COMPLETED    # No issues found — not an error
  on_completed: submit-jobs

- task_type: submit-jobs
  method: SHELL
  timeout: 1m
  report_stdout: true
  dependencies:
    - gather-issues
  environment:
    SUBMITTED_IDS: '{{if .IssuesJSON}}{{SubmitJobsFromJSON "ai-jira-implement" .IssuesJSON (printf "_parent_id=%s" .JobID)}}{{end}}'
    PENDING_COUNT: '{{CountByJobTypeAndState "ai-jira-implement" "PENDING"}}'
    ISSUES_JSON: '{{.IssuesJSON}}'
  script:
    - echo "=== Jira Issue Picker Submit ==="
    - echo "Issues found ${ISSUES_JSON:-none}, pending=${PENDING_COUNT}, submitted=${SUBMITTED_IDS:-none}"

job_variables:
  MaxIssues: "5"
  PickupLabel: "ai-ready"
  InProgressLabel: "ai-in-progress"
  ClaudeUseBedrock: "1"
  AnthropicBedrockBaseUrl: "http://ai/bedrock"
  ClaudeSkipBedrockAuth: "1"
  # Injected via org configs (set via deploy-ai-jira-workflows.sh --set-configs):
  #   JiraUrl, JiraEmail, JiraProject, BitbucketWorkspace, BitbucketRepo  (plain)
  #   JiraApiToken                                                          (secret)
  # AnthropicApiKey is optional — Bedrock access via Tailscale needs no API key
