job_type: approval-unanimous-demo
description: All listed approvers must vote APPROVED (unanimous consent). Any single rejection immediately fails the gate — suitable for compliance-critical operations.
max_concurrency: 1
tasks:
- task_type: compliance-check
  method: KUBERNETES
  container:
    image: alpine:latest
  script:
    - echo "Compliance artifacts generated."
  on_completed: board-approval

- task_type: board-approval
  method: MANUAL
  description: "This operation requires unanimous consent from all board-designated approvers. A single rejection cancels the operation."
  approval_policy:
    min_approvals: 2
    require_unanimous: true
    sla_deadline: 24h
    timeout_action: AUTO_REJECT
  on_exit_code:
    APPROVED: execute-operation
    REJECTED: cancel-operation

- task_type: execute-operation
  method: KUBERNETES
  container:
    image: alpine:latest
  script:
    - echo "All directors approved. Executing compliance operation."

- task_type: cancel-operation
  method: KUBERNETES
  container:
    image: alpine:latest
  script:
    - echo "Operation cancelled — unanimous approval not reached."
