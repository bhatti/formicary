#
# Example: Dynamic fan-out for multi-region deployment.
#
# fan_out has two modes:
#
#   Task fan-out (default, no fork_job_type):
#     Dispatches one TaskRequest per array item to ant workers using the task's
#     original execution method. Children share the parent JobExecutionID.
#
#   Job fan-out (fork_job_type set):
#     Spawns one child JobRequest per array item using the FORK_JOB machinery.
#     Supports sub_workflow input/output variable mapping. Children have
#     cascade_cancel=true so they are always cancelled with their parent.
#
# IMPORTANT: The fan_out.source variable must be in the job execution context.
# Use job_variables (available to all tasks) rather than task-level variables:
# (task variables: only apply within that one task and do NOT propagate).
#
# Result keys: {item_var}_{index}_{original_key}  (e.g. region_0_status)
#
# Usage:
#   curl -X POST http://localhost:7777/api/jobs/definitions \
#     -H 'Content-Type: application/yaml' \
#     --data-binary @docs/examples/fan-out-deploy.yaml
#
# Submit:
#   curl -X POST http://localhost:7777/api/jobs/requests \
#     -H 'Content-Type: application/json' \
#     -d '{"job_type":"fan-out-deploy"}'
#
# Override regions at request time:
#   curl -X POST http://localhost:7777/api/jobs/requests \
#     -H 'Content-Type: application/json' \
#     -d '{"job_type":"fan-out-deploy","params":{"regions":"[\"us-east-1\",\"eu-west-1\"]"}}'
#
# See: docs/14-advanced-workflows.md#dynamic-task-fan-out

job_type: fan-out-deploy
description: Deploy to multiple regions in parallel using fan-out

# job_variables are available to ALL tasks. Override via request params.
job_variables:
  regions: '["us-east-1","us-west-2","eu-west-1","ap-southeast-1","eu-central-1"]'

tasks:
  - task_type: setup
    method: SHELL
    description: Prepare the deployment pipeline
    script:
      - echo "Preparing deployment pipeline"
    on_completed: deploy

  - task_type: deploy
    method: SHELL
    description: Deploy service to one region (fan-out expands this to all regions)
    fan_out:
      source: regions      # job_variables key — must be a JSON array
      item_var: region     # variable name injected into each child task
      max_parallel: 2      # at most 2 deployments run at the same time
      fail_fast: false     # continue remaining regions even if one fails
    script:
      - echo "Deploying to {{.region}}"
      - echo "region={{.region}} status=deployed"
    timeout: 10m
    on_completed: report
    on_exit_code:
      FAILED: report       # always run report even on partial failure

  - task_type: report
    method: SHELL
    description: Summarise deployment results collected by fan-out
    script:
      - echo "Deployment complete — see fan-out context for per-region status"
      # Per-region keys are available as: region_0_status, region_1_status, …
      # region_0_error_message, region_1_error_message, etc.
