job_type: semi-automated
description: Semi automated
max_concurrency: 1
tasks:
- task_type: start
  script:
    - echo starting... 
  method: KUBERNETES
  container:
    image: ubuntu:16.04
  on_completed: make-doe
- task_type: make-doe
  method: MANUAL
  approval_policy:
    min_approvals: 1
    sla_deadline: 2h
    timeout_action: ESCALATE
    escalation_recipients: "admin@example.com"
  on_completed: cook
- task_type: cook
  method: "KUBERNETES"
  container:
    image: ubuntu:16.04
  script:
    - echo cooking... 
  on_completed: check-doe
- task_type: check-doe
  method: MANUAL
  approval_policy:
    min_approvals: 2
    require_unanimous: false
    sla_deadline: 4h
    timeout_action: AUTO_REJECT
  on_completed: serve
- task_type: serve
  method: "KUBERNETES"
  container:
    image: ubuntu:16.04
  script:
    - "echo 'Serving......'"
