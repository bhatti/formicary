job_type: versioned-job
description: >
  Demonstrates job definition versioning. Every time you POST this YAML,
  Formicary stores a new version. You can list all versions and restart a
  failed job request pinned to any historical version.

  Register v1:
    curl -X POST http://localhost:7777/api/jobs/definitions \
      -H "Content-Type: application/x-yaml" --data-binary @versioned-job.yaml

  Submit a request:
    curl -X POST http://localhost:7777/api/jobs/requests \
      -H "Content-Type: application/json" \
      -d '{"job_type":"versioned-job"}'

  List all stored versions:
    curl http://localhost:7777/api/jobs/definitions/type/versioned-job/versions \
      -H "Authorization: Bearer <token>"

  Restart using the latest definition (hard restart — re-runs all tasks):
    curl -X POST "http://localhost:7777/api/jobs/requests/<request_id>/restart?hard=true" \
      -H "Authorization: Bearer <token>"

  Restart pinned to semantic version 1.0.0 (soft restart — resume from failure):
    curl -X POST "http://localhost:7777/api/jobs/requests/<request_id>/restart?version=1.0.0" \
      -H "Authorization: Bearer <token>"

  Restart pinned to a specific definition UUID:
    curl -X POST "http://localhost:7777/api/jobs/requests/<request_id>/restart?version=<def_id>" \
      -H "Authorization: Bearer <token>"

sem_version: "1.0.0"
max_concurrency: 1

tasks:
  - task_type: step-one
    method: SHELL
    script:
      - echo "Running step-one at version {{.SemVersion}}"
    on_completed: step-two

  - task_type: step-two
    method: SHELL
    script:
      - echo "Running step-two at version {{.SemVersion}}"
