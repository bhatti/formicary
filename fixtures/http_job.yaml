job_type: http-job
max_concurrency: 1
tasks:
- task_type: get
  method: HTTP_GET
  tags:
  - builder
  - pulsar
  script:
    - https://jsonplaceholder.typicode.com/todos/1
  on_completed: post
- task_type: post
  method: HTTP_POST_JSON
  tags:
  - builder
  - pulsar
  script:
    - https://jsonplaceholder.typicode.com/todos
  on_completed: put
- task_type: put
  method: HTTP_PUT_JSON
  tags:
  - builder
  - pulsar
  script:
    - https://jsonplaceholder.typicode.com/todos/1
  on_completed: delete
- task_type: delete
  method: HTTP_DELETE
  tags:
  - builder
  - pulsar
  script:
    - https://jsonplaceholder.typicode.com/todos/1
  on_completed: another-fork-task
- task_type: another-fork-task
  method: FORK_JOB
  fork_job_type: bad-job
  sub_workflow:
    input_params:
      - name: f1
        value: "1000"
      - name: f2
        value: "mykey"
  on_completed: another-fork-wait
- task_type: another-fork-wait
  method: AWAIT_FORKED_JOB
  await_forked_tasks:
    - another-fork-task
