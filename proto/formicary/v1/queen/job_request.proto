syntax = "proto3";

package formicary.v1.queen;

import "buf/validate/validate.proto";
import "formicary/v1/annotations.proto";
import "formicary/v1/queen/approval.proto";
import "formicary/v1/queen/job_execution.proto";
import "google/protobuf/timestamp.proto";

option go_package = "plexobject.com/formicary/gen/go/formicary/v1/queen;queen";

// JobRequestParam holds a named parameter passed with a job request.
message JobRequestParam {
  string id = 1 [(formicary.v1.tags) = "json:\"id\" gorm:\"primary_key\""];
  string job_request_id = 2 [(formicary.v1.tags) = "json:\"job_request_id\""];
  string name = 3 [(formicary.v1.tags) = "json:\"name\""];
  string value = 4 [(formicary.v1.tags) = "json:\"value\""];
  string kind = 5 [(formicary.v1.tags) = "json:\"kind\""];
  bool secret = 6 [(formicary.v1.tags) = "json:\"secret\""];
}

// JobRequest represents a user's request to execute a job definition.
message JobRequest {
  string id = 1 [(formicary.v1.tags) = "json:\"id\" gorm:\"primary_key\""];
  string parent_id = 2 [(formicary.v1.tags) = "json:\"parent_id\""];
  string user_key = 3 [(formicary.v1.tags) = "json:\"user_key\""];
  string job_definition_id = 4 [(formicary.v1.tags) = "json:\"job_definition_id\""];
  string job_execution_id = 5 [(formicary.v1.tags) = "json:\"job_execution_id\""];
  string last_job_execution_id = 6 [(formicary.v1.tags) = "json:\"last_job_execution_id\""];
  string organization_id = 7 [(formicary.v1.tags) = "json:\"organization_id\""];
  string user_id = 8 [(formicary.v1.tags) = "json:\"user_id\""];
  int32 permissions = 9 [(formicary.v1.tags) = "json:\"permissions\""];
  string description = 10 [(formicary.v1.tags) = "json:\"description\""];
  string platform = 11 [(formicary.v1.tags) = "json:\"platform\""];
  string job_type = 12 [
    (formicary.v1.tags) = "json:\"job_type\"",
    (buf.validate.field).string.min_len = 1
  ];
  string job_version = 13 [(formicary.v1.tags) = "json:\"job_version\""];
  // job_state stores RequestState as string.
  string job_state = 14 [(formicary.v1.tags) = "json:\"job_state\""];
  string job_group = 15 [(formicary.v1.tags) = "json:\"job_group\""];
  int32 job_priority = 16 [(formicary.v1.tags) = "json:\"job_priority\""];
  int64 timeout_ns = 17 [(formicary.v1.tags) = "yaml:\"timeout,omitempty\" json:\"timeout\""];
  int32 schedule_attempts = 18 [(formicary.v1.tags) = "json:\"schedule_attempts\" gorm:\"schedule_attempts\""];
  int32 retried = 19 [(formicary.v1.tags) = "json:\"retried\""];
  bool cron_triggered = 20 [(formicary.v1.tags) = "json:\"cron_triggered\""];
  string quick_search = 21 [(formicary.v1.tags) = "json:\"quick_search\""];
  string error_code = 22 [(formicary.v1.tags) = "json:\"error_code\""];
  string error_message = 23 [(formicary.v1.tags) = "json:\"error_message\""];
  string current_task = 24 [(formicary.v1.tags) = "json:\"current_task\""];
  repeated JobRequestParam params = 25 [(formicary.v1.tags) = "yaml:\"-\" json:\"-\" gorm:\"ForeignKey:JobRequestID\" gorm:\"auto_preload\" gorm:\"constraint:OnUpdate:CASCADE\""];
  google.protobuf.Timestamp scheduled_at = 26 [(formicary.v1.tags) = "json:\"scheduled_at\""];
  google.protobuf.Timestamp created_at = 27 [(formicary.v1.tags) = "json:\"created_at\""];
  google.protobuf.Timestamp updated_at = 28 [(formicary.v1.tags) = "json:\"updated_at\" gorm:\"updated_at\""];
  // Transient fields.
  JobExecution execution = 29 [(formicary.v1.tags) = "yaml:\"-\" json:\"execution\" gorm:\"-\""];
  string name_value_params_json = 30 [(formicary.v1.tags) = "yaml:\"params,omitempty\" json:\"params\" gorm:\"-\""];
  string params_json = 31 [(formicary.v1.tags) = "yaml:\"-\" json:\"-\" gorm:\"-\""];
  map<string, string> errors = 32 [(formicary.v1.tags) = "yaml:\"-\" json:\"-\" gorm:\"-\""];
  // hard_restart forces all tasks to re-run from scratch on next restart,
  // ignoring any previously completed task results. Cleared after the job starts executing.
  bool hard_restart = 33 [(formicary.v1.tags) = "json:\"hard_restart\" gorm:\"hard_restart\""];
  // cascade_cancel marks this child job for automatic cancellation when its parent job is cancelled.
  // Always set to true by the FORK_JOB tasklet — all forked children are cascade-cancelled.
  bool cascade_cancel = 34 [(formicary.v1.tags) = "json:\"cascade_cancel\" gorm:\"cascade_cancel\""];
}

// PendingApproval describes a task execution awaiting votes.
message PendingApproval {
  string job_request_id = 1 [(formicary.v1.tags) = "json:\"job_request_id\""];
  string task_execution_id = 2 [(formicary.v1.tags) = "json:\"task_execution_id\""];
  string job_type = 3 [(formicary.v1.tags) = "json:\"job_type\""];
  string task_type = 4 [(formicary.v1.tags) = "json:\"task_type\""];
  ApprovalStatus status = 5 [(formicary.v1.tags) = "json:\"status\""];
  google.protobuf.Timestamp requested_at = 6 [(formicary.v1.tags) = "json:\"requested_at\""];
}
