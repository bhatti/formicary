syntax = "proto3";

package formicary.v1.queen;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";
import "formicary/v1/annotations.proto";

option go_package = "plexobject.com/formicary/gen/go/formicary/v1/queen;queen";

// TriggerAuthMethod defines how inbound webhook requests are authenticated.
enum TriggerAuthMethod {
  TRIGGER_AUTH_METHOD_UNSPECIFIED = 0;
  TRIGGER_AUTH_HMAC_SHA256 = 1;
  TRIGGER_AUTH_BEARER_TOKEN = 2;
  TRIGGER_AUTH_API_KEY_HEADER = 3;
}

// TriggerAuth defines authentication configuration for webhook triggers.
message TriggerAuth {
  TriggerAuthMethod method = 1 [
    (formicary.v1.tags) = "yaml:\"method\" json:\"method\""
  ];
  // secret_config references a JobDefinitionConfig name whose value holds the secret.
  string secret_config = 2 [
    (formicary.v1.tags) = "yaml:\"secret_config\" json:\"secret_config\""
  ];
  // header is the HTTP header carrying the signature or token.
  string header = 3 [
    (formicary.v1.tags) = "yaml:\"header\" json:\"header\""
  ];
}

// TriggerRateLimit caps how many job requests a trigger can create per window.
message TriggerRateLimit {
  int32 max = 1 [
    (buf.validate.field).int32.gt = 0,
    (formicary.v1.tags) = "yaml:\"max\" json:\"max\""
  ];
  // window_ns stores the rate-limit window duration in nanoseconds.
  int64 window_ns = 2 [
    (formicary.v1.tags) = "yaml:\"window\" json:\"window\""
  ];
}

// TriggerDefinition describes a single event trigger on a job definition.
// type must be one of: "webhook", "s3", "queue".
message TriggerDefinition {
  string type = 1 [
    (buf.validate.field).string = {in: ["webhook", "s3", "queue"]},
    (formicary.v1.tags) = "yaml:\"type\" json:\"type\""
  ];
  string name = 2 [
    (buf.validate.field).string.min_len = 1,
    (formicary.v1.tags) = "yaml:\"name\" json:\"name\""
  ];

  // Webhook-specific: path suffix for the inbound route POST /api/triggers/{job_type}/{name}
  string path = 3 [
    (formicary.v1.tags) = "yaml:\"path,omitempty\" json:\"path,omitempty\""
  ];
  TriggerAuth auth = 4 [
    (formicary.v1.tags) = "yaml:\"auth,omitempty\" json:\"auth,omitempty\""
  ];

  // S3-specific: mode is "poll" (default) or "notification".
  string mode = 5 [
    (formicary.v1.tags) = "yaml:\"mode,omitempty\" json:\"mode,omitempty\""
  ];
  string bucket = 6 [
    (formicary.v1.tags) = "yaml:\"bucket,omitempty\" json:\"bucket,omitempty\""
  ];
  string prefix = 7 [
    (formicary.v1.tags) = "yaml:\"prefix,omitempty\" json:\"prefix,omitempty\""
  ];
  string suffix = 8 [
    (formicary.v1.tags) = "yaml:\"suffix,omitempty\" json:\"suffix,omitempty\""
  ];
  // poll_interval_ns stores the S3 poll interval in nanoseconds.
  int64 poll_interval_ns = 9 [
    (formicary.v1.tags) = "yaml:\"poll_interval,omitempty\" json:\"poll_interval,omitempty\""
  ];

  // Queue-specific.
  string topic = 10 [
    (formicary.v1.tags) = "yaml:\"topic,omitempty\" json:\"topic,omitempty\""
  ];
  string group = 11 [
    (formicary.v1.tags) = "yaml:\"group,omitempty\" json:\"group,omitempty\""
  ];
  bool shared = 12 [
    (formicary.v1.tags) = "yaml:\"shared,omitempty\" json:\"shared,omitempty\""
  ];

  // Common: params maps job param names to Go template expressions over event data.
  map<string, string> params = 13 [
    (formicary.v1.tags) = "yaml:\"params,omitempty\" json:\"params,omitempty\""
  ];
  // filter is a Go template expression; trigger fires only when trimmed result is "true".
  string filter = 14 [
    (formicary.v1.tags) = "yaml:\"filter,omitempty\" json:\"filter,omitempty\""
  ];
  // dedup_key is a Go template expression whose result becomes JobRequest.UserKey.
  string dedup_key = 15 [
    (formicary.v1.tags) = "yaml:\"dedup_key,omitempty\" json:\"dedup_key,omitempty\""
  ];
  TriggerRateLimit rate_limit = 16 [
    (formicary.v1.tags) = "yaml:\"rate_limit,omitempty\" json:\"rate_limit,omitempty\""
  ];
}

// TriggerState persists per-trigger runtime state: S3 poll marker and rate-limit window.
message TriggerState {
  string id = 1 [(formicary.v1.tags) = "json:\"id\" gorm:\"primary_key\""];
  string job_definition_id = 2 [
    (buf.validate.field).string.min_len = 1,
    (formicary.v1.tags) = "json:\"job_definition_id\" gorm:\"index\""
  ];
  string trigger_name = 3 [
    (buf.validate.field).string.min_len = 1,
    (formicary.v1.tags) = "json:\"trigger_name\""
  ];
  // last_seen_key is the S3 object key of the last successfully processed object.
  string last_seen_key = 4 [(formicary.v1.tags) = "json:\"last_seen_key\""];
  google.protobuf.Timestamp last_seen_time = 5 [(formicary.v1.tags) = "json:\"last_seen_time\""];
  google.protobuf.Timestamp window_start = 6 [(formicary.v1.tags) = "json:\"window_start\""];
  int32 window_count = 7 [(formicary.v1.tags) = "json:\"window_count\""];
  google.protobuf.Timestamp created_at = 8 [(formicary.v1.tags) = "json:\"created_at\""];
  google.protobuf.Timestamp updated_at = 9 [(formicary.v1.tags) = "json:\"updated_at\""];
}
