syntax = "proto3";

package formicary.v1.services;

import "buf/validate/validate.proto";
import "formicary/v1/queen/trigger.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "plexobject.com/formicary/gen/go/formicary/v1/services;services";

message ListTriggerStatesRequest {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "ListTriggerStatesRequest"
      description: "Request to list trigger states for a job definition."
      required: ["job_type"]
    }
  };
  string job_type = 1 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The job type whose trigger states to retrieve."}
  ];
}

message ListTriggerStatesResponse {
  repeated queen.TriggerState states = 1;
}

message ResetTriggerStateRequest {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "ResetTriggerStateRequest"
      description: "Request to reset the runtime state of one trigger."
      required: [
        "job_type",
        "trigger_name"
      ]
    }
  };
  string job_type = 1 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The job type containing the trigger."}
  ];
  string trigger_name = 2 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The trigger name to reset."}
  ];
}

message FireWebhookTriggerRequest {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "FireWebhookTriggerRequest"
      description: "Programmatically fire a webhook trigger. Caller is authenticated via JWT; HTTP auth on the trigger is bypassed."
      required: [
        "job_type",
        "trigger_name"
      ]
    }
  };
  string job_type = 1 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The job type containing the trigger."}
  ];
  string trigger_name = 2 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The trigger name to fire."}
  ];
  // payload is the raw JSON body forwarded to the trigger evaluator.
  bytes payload = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "JSON payload passed to the trigger evaluator as .Body."}];
  map<string, string> headers = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Optional headers forwarded to the trigger evaluator as .Headers."}];
}

message FireWebhookTriggerResponse {
  // request_id is the created JobRequest ID; empty string if filtered out or deduped.
  string request_id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "JobRequest ID created by this trigger. Empty if filtered or deduped."}];
}

// TriggerService inspects trigger runtime state and provides a programmatic
// webhook-fire endpoint for testing and CI integrations.
service TriggerService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    description: "Inspect and manage event-driven trigger state for job definitions."
    name: "triggers"
  };

  // ListTriggerStates returns the runtime state (poll markers, rate-limit windows)
  // for all triggers configured on a job definition.
  rpc ListTriggerStates(ListTriggerStatesRequest) returns (ListTriggerStatesResponse) {
    option (google.api.http) = {get: "/api/v1/jobs/definitions/{job_type}/triggers"};
  }

  // ResetTriggerState clears poll markers and rate-limit counters for one trigger,
  // allowing it to reprocess events from the beginning.
  rpc ResetTriggerState(ResetTriggerStateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/jobs/definitions/{job_type}/triggers/{trigger_name}/state"};
  }

  // FireWebhookTrigger programmatically fires a webhook trigger. The caller must
  // be authenticated via gRPC/JWT; trigger-level HTTP auth (HMAC, bearer) is
  // bypassed. Useful for testing pipelines and CI integrations.
  rpc FireWebhookTrigger(FireWebhookTriggerRequest) returns (FireWebhookTriggerResponse) {
    option (google.api.http) = {
      post: "/api/v1/jobs/definitions/{job_type}/triggers/{trigger_name}/fire"
      body: "*"
    };
  }
}
