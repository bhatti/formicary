{{ template "layouts/header" . }}
<div class="page-header mb-4">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">Edit Error Code</h2>
        </div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3 class="card-title">Error Code Details</h3>
    </div>
    <div class="card-body">
        <form action="/dashboard/errors/{{ .Error.ID }}" method="POST">
            {{ template "errors/form" .Error }}
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Update Error Code</button>
            </div>
        </form>
    </div>
</div>
{{ template "layouts/footer" }}
