<div class="card mb-3">
    <div class="card-header">
        <h3 class="card-title">Job Configurations</h3>
        <div class="card-options">
            <a href="/dashboard/jobs/definitions/{{.ID}}/configs/new" class="btn btn-primary btn-sm">
                <i class="ti ti-plus"></i> New Job Config
            </a>
        </div>
    </div>
    <div class="card-body text-secondary small">
        External configurations such as tokens and secrets that can be used in job definitions.
    </div>
    <div class="table-responsive">
        <table class="table table-vcenter table-hover table-sm card-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Secret</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            {{range .Configs}}
            <tr>
                <td><a href="/dashboard/jobs/definitions/{{$.ID}}/configs/{{.ID}}">{{.ID}}</a></td>
                <td>{{.Name}}</td>
                <td>{{.Secret}}</td>
                <td>
                    <div class="d-flex gap-1 flex-wrap">
                        <form action="/dashboard/jobs/definitions/{{$.ID}}/configs/{{.ID}}" method="GET">
                            <input type="submit" class="btn btn-primary btn-sm" value="View">
                        </form>
                        <form action="/dashboard/jobs/definitions/{{$.ID}}/configs/{{.ID}}/edit" method="GET">
                            <input type="submit" class="btn btn-secondary btn-sm" value="Edit">
                        </form>
                        <form action="/dashboard/jobs/definitions/{{$.ID}}/configs/{{.ID}}/delete" method="POST" enctype="multipart/form-data"
                              onsubmit="return confirm('Please confirm deleting this config (' + this['id'].value + ')?');">
                            <input type="submit" class="btn btn-danger btn-sm" value="Delete">
                            <input type="hidden" name="id" value="{{.Name}}">
                        </form>
                    </div>
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
    </div>
</div>
