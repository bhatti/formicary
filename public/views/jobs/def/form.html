<div class="mb-3">
    {{ with .Errors.Error }}
    <div class="alert alert-danger">{{ . }}</div>
    {{ end }}
</div>

<div class="mb-3">
    <label for="raw_yaml" class="form-label">Job Definition (in YAML)</label>
    <textarea class="form-control font-monospace" id="raw_yaml" name="raw_yaml" rows="20">{{.RawYaml}}</textarea>
    <div class="form-text">Refer to <a href="/docs/definition_options.html">Job Definition Docs</a> for job and tasks configuration options.</div>
</div>
