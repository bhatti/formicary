{{ template "layouts/header" . }}
<div class="page-header mb-4">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">Organizations</h2>
        </div>
        <div class="col-auto d-flex gap-2 flex-wrap">
            <form action="/dashboard/orgs" method="GET" class="d-flex gap-2">
                <input type="text" class="form-control form-control-sm" name="q" id="q" value="{{ .Q }}" placeholder="Search organizations">
                <button type="submit" class="btn btn-primary btn-sm">Search</button>
            </form>
        </div>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-vcenter table-hover table-sm card-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Bundle</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            {{range .Records}}
            <tr>
                <td><a href="/dashboard/orgs/{{.ID}}">{{.ID}}</a></td>
                <td>{{.OrgUnit}}</td>
                <td>{{.BundleID}}</td>
                <td>
                    <div class="d-flex gap-1 flex-wrap">
                        <form action="/dashboard/orgs/{{.ID}}" method="GET">
                            <input type="submit" class="btn btn-primary btn-sm" value="View">
                        </form>
                        <form action="/dashboard/users" method="GET">
                            <input type="hidden" name="organization_id" value="{{.ID}}">
                            <input type="submit" class="btn btn-secondary btn-sm" value="Users">
                        </form>
                        {{if eq .ID $.DBUserOrg}}
                        <form action="/dashboard/orgs/invite/{{.ID}}" method="GET">
                            <input type="submit" class="btn btn-info btn-sm" value="Invite">
                        </form>
                        {{end}}
                        {{if $.Admin}}
                        <form action="/dashboard/orgs/{{.ID}}/delete" method="POST" enctype="multipart/form-data"
                              onsubmit="return confirm('Please confirm deleting this org(' + this['id'].value + ') and all users within the organization?');">
                            <input type="submit" class="btn btn-danger btn-sm" value="Delete">
                            <input type="hidden" name="id" value="{{.OrgUnit}}">
                        </form>
                        {{end}}
                    </div>
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
    </div>
</div>
{{ template "layouts/pagination" .Pagination }}
{{ template "layouts/footer" }}
