{{ template "layouts/header" . }}
<div class="page-header mb-4">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">Organization Invitations</h2>
        </div>
        <div class="col-auto d-flex gap-2 flex-wrap">
            <form action="/dashboard/orgs/invitations" method="GET" class="d-flex gap-2">
                <input type="text" class="form-control form-control-sm" name="q" id="q" value="{{ .Q }}" placeholder="Search invitations">
                <button type="submit" class="btn btn-primary btn-sm">Search</button>
            </form>
        </div>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-vcenter table-hover table-sm card-table">
            <thead>
            <tr>
                <th>Email</th>
                <th>Code</th>
                <th>Organization</th>
                <th>Accepted</th>
                <th>Expiration</th>
            </tr>
            </thead>
            <tbody>
            {{range .Records}}
            <tr>
                <td>{{.Email}}</td>
                <td>{{.InvitationCode}}</td>
                <td><a href="/dashboard/orgs/{{.OrganizationID}}">{{.OrganizationID}}</a></td>
                <td>{{.AcceptedAt}}</td>
                <td>{{.ExpiresAt}}</td>
            </tr>
            {{end}}
            </tbody>
        </table>
    </div>
</div>
{{ template "layouts/pagination" .Pagination }}
{{ template "layouts/footer" }}
