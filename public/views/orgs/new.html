<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Formicary - Create Organization</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.22.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="antialiased d-flex flex-column">
  <div class="flex-fill d-flex flex-column justify-content-center py-4">
    <div class="container-tight py-6">
      <div class="text-center mb-4">
        <h2>Formicary</h2>
        <p class="text-secondary">Distributed job orchestration</p>
      </div>
      <div class="card card-md">
        <div class="card-header">
          <h3 class="card-title"><i class="ti ti-building me-2"></i>Create Organization</h3>
        </div>
        <div class="card-body">
          <form action="/dashboard/users" method="POST">
            {{ template "users/form" .User }}
            <div class="d-grid mt-3">
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
</body>
</html>
