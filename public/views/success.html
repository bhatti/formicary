{{ template "layouts/anon_header" . }}
<div class="card card-md mx-auto mt-5" style="max-width:480px">
    <div class="card-header">
        <h3 class="card-title"><i class="ti ti-user-check me-2 text-success"></i>Profile Information</h3>
    </div>
    <div class="card-body">
        <dl class="row mb-0">
            <dt class="col-5 text-secondary">ID</dt>
            <dd class="col-7">{{.UserID}}</dd>
            <dt class="col-5 text-secondary">Email</dt>
            <dd class="col-7">{{.Email}}</dd>
            <dt class="col-5 text-secondary">Name</dt>
            <dd class="col-7">{{.Name}}</dd>
        </dl>
    </div>
    <div class="card-footer">
        <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
    </div>
</div>
{{ template "layouts/anon_footer" }}
