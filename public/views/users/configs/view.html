{{ template "layouts/header" . }}

<div class="page-header mb-4">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">Credential</h2>
        </div>
        {{ with .Config }}
        <div class="col-auto">
            <a href="/dashboard/users/configs/{{.ID}}/edit" class="btn btn-secondary btn-sm">
                <i class="ti ti-pencil"></i> Edit
            </a>
        </div>
        {{ end }}
    </div>
</div>

<div class="card mb-3">
    <div class="card-body">
        {{ with .Config }}
        <dl class="row">
            <dt class="col-5 text-secondary">ID</dt>
            <dd class="col-7">{{ .ID }}</dd>
            <dt class="col-5 text-secondary">Name</dt>
            <dd class="col-7">{{ .Name }}</dd>
            <dt class="col-5 text-secondary">Secret</dt>
            <dd class="col-7">{{ .Secret }}</dd>
            <dt class="col-5 text-secondary">Value</dt>
            <dd class="col-7">
                {{if .Secret}}
                <div class="d-flex align-items-center gap-2">
                    <span class="font-monospace text-muted" id="secret-value">****</span>
                    <button class="btn btn-sm btn-outline-secondary" id="reveal-btn"
                            onclick="revealSecret('{{.ID}}')">
                        <i class="ti ti-eye"></i> Reveal
                    </button>
                </div>
                {{else}}
                <textarea class="form-control font-monospace" rows="3" readonly>{{ .Value }}</textarea>
                {{end}}
            </dd>
        </dl>
        {{ end }}
    </div>
</div>

<script>
function revealSecret(configId) {
    fetch('/api/users/configs/' + configId + '/reveal', {credentials: 'same-origin'})
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(cfg) {
        document.getElementById('secret-value').textContent = cfg.value || '';
        document.getElementById('reveal-btn').style.display = 'none';
    })
    .catch(function(e) { alert('Failed to reveal credential: ' + e); });
}
</script>

{{ template "layouts/footer" }}
