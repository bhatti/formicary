<div class="mb-3">
    {{ with .Errors.Error }}
    <div class="alert alert-danger">{{ . }}</div>
    {{ end }}
</div>

<div class="mb-3">
    <label class="form-label">Username</label>
    <div class="form-control-plaintext"><strong>{{ .Username }}</strong></div>
</div>

<div class="mb-3">
    {{ with .Errors.Name }}
    <div class="alert alert-danger">{{ . }}</div>
    {{ end }}
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" name="name" id="name"
           value="{{ .Name }}"
           placeholder="your name">
</div>

<div class="mb-3">
    {{ with .Errors.Email }}
    <div class="alert alert-danger">{{ . }}</div>
    {{ end }}
    <label for="email" class="form-label">Email</label>
    <input type="text" class="form-control" name="email" id="email"
           value="{{ .Email }}"
           placeholder="your email address">
</div>

{{ if .HasOrganization }}
<div class="mb-3">
    <label class="form-label">Organization</label>
    <div><a href="/dashboard/orgs/{{.OrganizationID}}">{{.OrganizationID}}</a></div>
</div>

<div class="mb-3">
    <label class="form-label">Bundle</label>
    <div class="form-control-plaintext"><strong>{{ .BundleID }}</strong></div>
</div>
{{ end }}
