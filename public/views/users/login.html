<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Formicary – Sign In</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.22.0/dist/tabler-icons.min.css">
</head>
<body class="antialiased d-flex flex-column">
  <div class="flex-fill d-flex flex-column justify-content-center py-4">
    <div class="container-tight py-6">
      <div class="text-center mb-4">
        <img src="/images/formicary250.png" height="60" alt="Formicary" class="mb-3">
        <h2>Formicary</h2>
        <p class="text-secondary">Distributed job orchestration</p>
      </div>
      <div class="card card-md">
        <div class="card-body">
          <h2 class="h2 text-center mb-4">Sign in to your account</h2>
          <div class="d-grid gap-2">
            {{if .HasGoogleOAuth}}
            <a href="/auth/google" class="btn btn-outline-secondary">
              <i class="ti ti-brand-google me-2"></i>Sign in with Google
            </a>
            {{end}}
            {{if .HasGithubOAuth}}
            <a href="/auth/github" class="btn btn-outline-secondary">
              <i class="ti ti-brand-github me-2"></i>Sign in with GitHub
            </a>
            {{end}}
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
</body>
</html>
