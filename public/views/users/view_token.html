{{ template "layouts/header" . }}
<div class="page-header mb-4">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">API Token Created</h2>
        </div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3 class="card-title">API Token Details</h3>
    </div>
    <div class="card-body">
        <dl class="row">
            <dt class="col-5 text-secondary">Token Name</dt>
            <dd class="col-7">{{ .Token.TokenName }}</dd>
            <dt class="col-5 text-secondary">Expires</dt>
            <dd class="col-7">{{ .Token.ExpiresAt }}</dd>
        </dl>
        <div class="mb-3">
            <label class="form-label">API Key</label>
            <textarea id="api_token" class="form-control font-monospace" rows="5" readonly>{{ .Token.APIToken }}</textarea>
        </div>
        <div class="mb-3">
            <button type="button" class="btn btn-secondary btn-sm" onclick="copyToClipboard('api_token');">
                <i class="ti ti-copy"></i> Copy to Clipboard
            </button>
            <span class="text-secondary ms-2 small">Copy your API token — it will not be displayed again.</span>
        </div>
    </div>
</div>

<script>
function copyToClipboard(id) {
    document.getElementById(id).select();
    document.execCommand('copy');
}
</script>
{{ template "layouts/footer" }}
